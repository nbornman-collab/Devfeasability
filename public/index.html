<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DevFeasibility — London Development Analysis</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c13;--surface:#12141f;--surface2:#1a1d2e;--border:#2a2d42;
  --text:#eef0f6;--text2:#a0a4be;--text3:#6b6f8a;
  --accent:#7c6aef;--accent2:#9d8fff;--accent-glow:rgba(124,106,239,.18);
  --green:#2dd4a0;--green-glow:rgba(45,212,160,.12);
  --amber:#f5b731;--red:#ef6461;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;top:0;left:0;right:0;bottom:0}

/* Search bar */
.search-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;width:min(520px,calc(100vw - 32px))}
.search-wrap input{
  width:100%;padding:14px 20px 14px 44px;border:1px solid var(--border);border-radius:14px;
  background:rgba(18,20,31,.94);backdrop-filter:blur(24px);color:var(--text);font:400 15px var(--sans);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(18,20,31,.97);
  backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:14px;overflow:hidden;
  max-height:260px;overflow-y:auto;display:none;
}
.search-results.show{display:block}
.search-results div{padding:12px 20px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);transition:background .15s;color:var(--text2)}
.search-results div:last-child{border-bottom:none}
.search-results div:hover{background:var(--accent-glow);color:var(--text)}

/* Panel */
.panel{
  position:fixed;top:0;right:0;width:440px;height:100%;background:rgba(10,12,19,.96);
  backdrop-filter:blur(28px);border-left:1px solid var(--border);z-index:5;
  transform:translateX(0);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.panel.collapsed{transform:translateX(100%)}
.panel-toggle{
  position:fixed;right:440px;top:50%;transform:translateY(-50%);z-index:6;
  width:28px;height:56px;background:rgba(18,20,31,.94);border:1px solid var(--border);
  border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--text2);transition:right .35s cubic-bezier(.4,0,.2,1),background .2s;
}
.panel.collapsed~.panel-toggle{right:0}
.panel-toggle:hover{background:var(--surface2);color:var(--text)}
.panel-toggle svg{transition:transform .3s}
.panel.collapsed~.panel-toggle svg{transform:rotate(180deg)}

/* Panel content */
.panel-header{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.panel-header h1{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
.panel-header .address{font-size:21px;font-weight:700;line-height:1.3;color:var(--text)}
.panel-header .subtitle{font-size:13px;color:var(--text2);margin-top:6px}

.section{padding:20px 24px;border-bottom:1px solid var(--border)}
.section-title{
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px
}
.section-title svg{width:14px;height:14px;opacity:.7}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--surface2);border:1px solid rgba(42,45,66,.5);border-radius:10px;padding:14px 16px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.stat-value{font:600 17px var(--mono);color:var(--text)}
.stat-value.accent{color:var(--accent2)}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat.full{grid-column:1/-1}
.stat.highlight{border-color:var(--accent);background:var(--accent-glow)}
.stat.highlight-green{border-color:var(--green);background:var(--green-glow)}

/* Utilization bar */
.util-bar-wrap{margin-top:14px}
.util-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;font-weight:500}
.util-bar{height:10px;background:var(--surface);border-radius:5px;overflow:hidden;position:relative}
.util-bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* Power bars */
.power-bar-wrap{margin-bottom:14px}
.power-bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.power-bar-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.power-bar-values{font:600 13px var(--mono);color:var(--text)}
.power-bar-values .current{color:var(--text3)}
.power-bar-values .potential{color:var(--green)}
.power-bar{height:14px;background:var(--surface);border-radius:7px;overflow:hidden;position:relative;display:flex}
.power-bar .existing{height:100%;background:#8a8ea0;border-radius:7px 0 0 7px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.power-bar .added{height:100%;background:var(--accent);opacity:.6;transition:width .8s cubic-bezier(.4,0,.2,1)}
.power-bar .pd-added{height:100%;background:var(--green);opacity:.5;transition:width .8s cubic-bezier(.4,0,.2,1)}
.power-bar-legend{display:flex;gap:14px;margin-top:6px;font-size:10px;color:var(--text3)}
.power-bar-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.power-bar-legend .leg-existing::before{background:#8a8ea0}
.power-bar-legend .leg-potential::before{background:var(--accent)}
.power-bar-legend .leg-pd::before{background:var(--green)}

/* Insight cards */
.insight{margin-bottom:10px;padding:12px 14px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--border);font-size:12px;line-height:1.6;color:var(--text2)}
.insight.critical{border-left-color:var(--red)}
.insight.opportunity{border-left-color:var(--green)}
.insight.caution{border-left-color:var(--amber)}
.insight strong{color:var(--text);font-weight:600}
.insight .insight-tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 6px;border-radius:3px;margin-right:6px}
.insight.critical .insight-tag{background:rgba(239,100,97,.15);color:var(--red)}
.insight.opportunity .insight-tag{background:rgba(45,212,160,.12);color:var(--green)}
.insight.caution .insight-tag{background:rgba(245,183,49,.12);color:var(--amber)}

/* Prominent constraint flags */
.constraint-flag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;margin:3px 4px 3px 0}
.constraint-flag.red{background:rgba(239,100,97,.12);color:var(--red);border:1px solid rgba(239,100,97,.2)}
.constraint-flag.amber{background:rgba(245,183,49,.1);color:var(--amber);border:1px solid rgba(245,183,49,.2)}
.constraint-flag.green{background:rgba(45,212,160,.1);color:var(--green);border:1px solid rgba(45,212,160,.2)}

/* Narrative */
.narrative{font-size:14px;line-height:1.75;color:var(--text2)}
.narrative strong{color:var(--text);font-weight:600}
.narrative .highlight{color:var(--accent2);font-weight:600}
.narrative .opportunity{
  margin-top:14px;padding:14px 18px;background:var(--accent-glow);border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0;font-size:13px;line-height:1.7;color:var(--text2);
}
.narrative .opportunity strong{color:var(--text)}

/* Financial table */
.fin-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(42,45,66,.4);font-size:13px;align-items:center}
.fin-row:last-child{border-bottom:none}
.fin-row .label{color:var(--text2)}
.fin-row .value{font:600 13px var(--mono);color:var(--text)}
.fin-row.total{border-top:2px solid var(--border);margin-top:6px;padding-top:14px}
.fin-row.total .label{font-weight:700;color:var(--text)}
.fin-row.total .value{font-weight:700;color:var(--green);font-size:15px}

/* PDR Tag */
.pdr-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:3px 4px 3px 0;letter-spacing:.3px}
.pdr-tag.available{background:var(--green-glow);color:var(--green);border:1px solid rgba(45,212,160,.25)}
.pdr-tag.restricted{background:rgba(239,100,97,.1);color:var(--red);border:1px solid rgba(239,100,97,.2)}

/* Notes */
.note-item{font-size:12px;color:var(--text3);padding:4px 0;line-height:1.5}
.note-item::before{content:'⚠ ';opacity:.6}

/* Loading */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s;
}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;color:var(--text2);font-size:14px}

/* Branding */
.brand{position:fixed;bottom:16px;left:16px;z-index:4;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.brand span{font-weight:700;color:var(--text2)}

/* 3D Labels */
.map-label{
  position:absolute;pointer-events:none;z-index:3;
  font:600 12px var(--mono);color:var(--text);
  background:rgba(10,12,19,.85);backdrop-filter:blur(8px);
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  white-space:nowrap;transform:translate(-50%,0);
  transition:opacity .3s, top .15s ease-out, left .15s ease-out;
}
.map-label.height-label{border-color:var(--green);color:var(--green)}
.map-label.pd-label{border-color:#5aebc2;color:#5aebc2;font-size:11px}
.map-label.existing-label{border-color:#ef8b6e;color:#ef8b6e}
.map-label .leader{
  position:absolute;pointer-events:none;
  stroke-width:1;stroke:var(--border);fill:none;
  overflow:visible;
}
.map-label .leader,.map-label .leader-dot{display:none}

/* Responsive */
@media(max-width:768px){
  .panel{width:100%;border-left:none;border-top:1px solid var(--border);height:55%;top:auto;bottom:0;border-radius:20px 20px 0 0}
  .panel.collapsed{transform:translateY(100%)}
  .panel-toggle{right:auto;left:50%;transform:translateX(-50%);top:auto;bottom:55%;width:56px;height:28px;
    border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none}
  .panel.collapsed~.panel-toggle{bottom:0}
  .panel-toggle svg{transform:rotate(90deg)}
  .panel.collapsed~.panel-toggle svg{transform:rotate(-90deg)}
}
</style>
</head>
<body>
<div class="loading-overlay" id="loader"><div class="loader"></div><p>Loading DevFeasibility…</p></div>

<div id="map"></div>

<!-- 3D Map Labels Container -->
<div id="map-labels"></div>
<div id="map-legend" style="position:absolute;bottom:30px;left:12px;z-index:4;font:500 10px var(--mono);
  background:rgba(10,12,19,.85);backdrop-filter:blur(8px);padding:8px 12px;border-radius:8px;
  border:1px solid var(--border);color:var(--text3);line-height:1.8;display:none">
  <div><span style="display:inline-block;width:18px;height:0;border-top:1.5px solid #9d8fff;vertical-align:middle;margin-right:6px"></span>Building footprint</div>
  <div><span style="display:inline-block;width:18px;height:0;border-top:1.2px dashed #e8c44a;vertical-align:middle;margin-right:6px"></span>Property line (est.)</div>
  <div><span style="display:inline-block;width:10px;height:10px;background:#ef8b6e;opacity:.88;vertical-align:middle;margin-right:6px;border-radius:2px"></span>Existing</div>
  <div><span style="display:inline-block;width:10px;height:10px;background:#2dd4a0;opacity:.35;vertical-align:middle;margin-right:6px;border-radius:2px"></span>Potential</div>
  <div><span style="display:inline-block;width:10px;height:10px;background:#5aebc2;opacity:.4;vertical-align:middle;margin-right:6px;border-radius:2px"></span>PD (no planning)</div>
</div>

<div class="search-wrap">
  <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input id="search" type="text" placeholder="Search London address…" autocomplete="off">
  <div class="search-results" id="results"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>DevFeasibility</h1>
    <div class="address" id="p-address">—</div>
    <div class="subtitle" id="p-subtitle"></div>
  </div>
  <div id="panel-body"><div class="section"><p class="narrative" style="color:var(--text3)">Search a London address to begin analysis</p></div></div>
</div>
<button class="panel-toggle" id="toggle" title="Toggle panel">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
</button>

<div class="brand">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  <span>DevFeasibility</span> v4 London
</div>

<script src="london-planning-engine.js"></script>
<script>
let map, marker, currentLabels = [], siteExtraData = {};

async function init(){
  const cfg = await(await fetch('/api/config')).json();
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container:'map',
    style:'mapbox://styles/mapbox/dark-v11',
    center:[-0.08, 51.512],
    zoom:14.5,
    pitch:50,
    bearing:-15,
    antialias:true
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');
  map.on('style.load',()=>{
    try{
      map.setPaintProperty('road-street','line-color','#8a8ea8');
      map.setPaintProperty('road-secondary-tertiary','line-color','#8a8ea8');
      map.setPaintProperty('road-primary','line-color','#a0a4c0');
    }catch(e){}
    ['road-label','road-number-shield'].forEach(l=>{try{map.setPaintProperty(l,'text-color','#d0d4e8')}catch(e){}});
    // Context buildings — heavily ghosted so site building pops
    if(!map.getLayer('3d-buildings')){
      map.addLayer({
        id:'3d-buildings',type:'fill-extrusion',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{
          'fill-extrusion-color':['interpolate',['linear'],['get','height'],0,'#141628',30,'#181c34',80,'#1e2240',150,'#242850'],
          'fill-extrusion-height':['get','height'],
          'fill-extrusion-base':['get','min_height'],
          'fill-extrusion-opacity':.35,
          'fill-extrusion-vertical-gradient':true,
        }
      });
    }
    if(!map.getLayer('building-outlines')){
      map.addLayer({
        id:'building-outlines',type:'line',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{'line-color':'rgba(80,86,130,0.1)','line-width':0.3}
      });
    }
    document.getElementById('loader').classList.add('hide');
    searchAddress('Great Suffolk Street, London SE1');
  });
  map.on('move', updateLabelPositions);
}

// --- SEARCH ---
function searchAddress(text){
  document.getElementById('search').value = text;
  fetch(`/api/geocode?text=${encodeURIComponent(text)}`)
    .then(r=>r.json()).then(d=>{
      if(d.features && d.features.length > 0) selectResult(d.features[0]);
    });
}

let debounceTimer;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  const q = e.target.value.trim();
  if(q.length < 3){document.getElementById('results').classList.remove('show');return}
  debounceTimer = setTimeout(()=>{
    fetch(`/api/geocode?text=${encodeURIComponent(q)}`).then(r=>r.json()).then(d=>{
      const el = document.getElementById('results');
      el.innerHTML = '';
      if(d.features && d.features.length){
        d.features.slice(0,5).forEach(f=>{
          const div = document.createElement('div');
          div.textContent = f.place_name;
          div.onclick = ()=>{selectResult(f);el.classList.remove('show');document.getElementById('search').value=f.place_name};
          el.appendChild(div);
        });
        el.classList.add('show');
      } else el.classList.remove('show');
    });
  },300);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('results').classList.remove('show')});

// --- SELECT RESULT + FETCH ALL DATA ---
async function selectResult(feature){
  const [lng,lat] = feature.center || feature.geometry.coordinates;
  map.flyTo({center:[lng,lat],zoom:16.5,pitch:55,bearing:-15,duration:2000});

  if(marker) marker.remove();
  const el = document.createElement('div');
  el.style.cssText = 'width:16px;height:16px;background:#7c6aef;border:3px solid white;border-radius:50%;box-shadow:0 0 16px rgba(124,106,239,.6)';
  marker = new mapboxgl.Marker({element:el}).setLngLat([lng,lat]).addTo(map);

  const address = feature.place_name || feature.text || '';
  const postcode = extractPostcode(address);

  // Show loading state
  document.getElementById('p-address').textContent = address.split(',')[0];
  document.getElementById('p-subtitle').textContent = 'Loading…';
  document.getElementById('panel-body').innerHTML = '<div class="section"><p class="narrative" style="color:var(--text3)">Fetching planning data…</p></div>';
  document.getElementById('panel').classList.remove('collapsed');

  // Parallel data fetches
  const [boroughRes, buildingRes, ptalRes, floodRes, conservationRes, listedRes] = await Promise.allSettled([
    fetch(`/api/borough?lat=${lat}&lng=${lng}`).then(r=>r.json()),
    fetch(`/api/building?lat=${lat}&lng=${lng}&radius=25`).then(r=>r.json()),
    fetch(`/api/ptal?lat=${lat}&lng=${lng}`).then(r=>r.json()),
    fetch(`/api/flood-zone?lat=${lat}&lng=${lng}`).then(r=>r.json()),
    fetch(`/api/conservation-areas?lat=${lat}&lng=${lng}&radius=80`).then(r=>r.json()),
    fetch(`/api/listed-buildings?lat=${lat}&lng=${lng}&radius=150`).then(r=>r.json()),
  ]);

  const boroughData = boroughRes.status === 'fulfilled' ? boroughRes.value : { borough: 'Unknown' };
  const osmData = buildingRes.status === 'fulfilled' ? buildingRes.value : { elements: [] };
  const ptalData = ptalRes.status === 'fulfilled' ? ptalRes.value : { ptal: null };
  const floodData = floodRes.status === 'fulfilled' ? floodRes.value : { floodZone: null };
  const conservationData = conservationRes.status === 'fulfilled' ? conservationRes.value : { elements: [] };
  const listedData = listedRes.status === 'fulfilled' ? listedRes.value : { elements: [] };

  // Parse building
  let buildingData = null;
  if(osmData.elements && osmData.elements.length > 0){
    const building = osmData.elements.find(e => e.type === 'way' && e.tags);
    if(building){
      buildingData = {
        name: building.tags.name || '',
        levels: parseInt(building.tags['building:levels']) || null,
        height: parseFloat(building.tags.height) || null,
        use: building.tags['building'] || '',
        architect: building.tags.architect || '',
        startDate: building.tags.start_date || '',
        nodes: osmData.elements.filter(e => e.type === 'node' && e.lat),
        wayNodes: building.nodes || []
      };
    }
  }

  // Plot area
  let plotArea = 0;
  if(buildingData && buildingData.nodes.length > 0 && buildingData.wayNodes.length > 0){
    const coords = buildingData.wayNodes.map(nid => buildingData.nodes.find(n => n.id === nid)).filter(Boolean);
    if(coords.length >= 3) plotArea = calcPolygonArea(coords);
  }

  const osmUse = buildingData?.use || '';
  const currentUse = guessUseClass(osmUse);
  const buildingType = getBuildingTypeFromOSM(osmUse);
  const isResidential = USE_CLASSES[currentUse]?.residential || false;
  const ftf = isResidential ? 3.0 : 4.2;
  const floors = buildingData?.levels || 2;
  const heightM = buildingData?.height || floors * ftf;
  // Fallback: estimate plot area from typical urban plot if no polygon
  if(!plotArea || plotArea < 20) plotArea = 200; // conservative 200sqm default
  const estimatedFloorArea = plotArea * floors * 0.85;

  // Parse extra data
  const conservationElements = conservationData.elements || [];
  const inConservationArea = conservationElements.length > 0;
  const conservationName = inConservationArea ? (conservationElements[0]?.tags?.name || 'Unnamed conservation area') : null;

  const listedElements = (listedData.elements || []).filter(e => e.tags);
  const nearbyListed = listedElements.map(e => ({
    name: e.tags.name || 'Unnamed',
    grade: e.tags.listed_status || e.tags['heritage:operator:ref'] || e.tags.heritage || '?',
    heRef: e.tags.HE_ref || e.tags['ref:GB:nhle'] || ''
  }));

  const floodZone = floodData.floodZone || 1;
  const ptal = ptalData.ptal;
  const ptalBand = ptalData.ptalBand || (boroughData.zone <= 2 ? '4-6' : '2-3');
  const nearestStations = ptalData.nearestStations || [];

  // Store extra data for panel
  siteExtraData = { floodZone, ptal, ptalBand, nearestStations, inConservationArea, conservationName, nearbyListed, postcode };

  // Get planning context
  const planning = getPlanningContext(boroughData.borough, {
    lat, lng, plotArea, floorArea: estimatedFloorArea, floors,
    currentUse, buildingType, ptalBand
  });

  const siteInfo = { plotArea, floors, heightM, estimatedFloorArea, lat, lng, postcode, isResidential, currentUse, ftf,
    buildingAge: buildingData?.startDate || null, buildingName: buildingData?.name || '' };

  renderPanel(planning, address, boroughData, buildingData, siteInfo);

  // Async EPC fetch (non-blocking — updates panel when ready)
  if(postcode){
    fetch(`/api/epc?postcode=${encodeURIComponent(postcode)}`).then(r=>r.json()).then(epcData => {
      if(epcData.certificates && epcData.certificates.length > 0){
        siteExtraData.epc = epcData;
        renderEPCSection(epcData, siteInfo);
      }
    }).catch(()=>{});
  }
  renderSite3D(lat, lng, buildingData, planning, siteInfo);
}

// --- 3D RENDERING ---
function renderSite3D(lat, lng, buildingData, planning, siteInfo){
  // Clean up all layers including dynamic floor lines
  const layersToRemove = ['site-fill','site-line','prop-line','current-3d','current-edge','potential-3d','potential-edge','pd-3d','pd-edge'];
  for(let f = 0; f < 30; f++) layersToRemove.push('floor-line-'+f);
  layersToRemove.forEach(id=>{ if(map.getLayer(id)) map.removeLayer(id); });
  const sourcesToRemove = ['site','prop-boundary','current-bldg','potential-bldg','pd-bldg'];
  for(let f = 0; f < 30; f++) sourcesToRemove.push('floor-line-'+f);
  sourcesToRemove.forEach(id=>{ if(map.getSource(id)) map.removeSource(id); });
  clearLabels();

  if(!buildingData || !buildingData.wayNodes || buildingData.wayNodes.length < 3) return;

  const coords = buildingData.wayNodes
    .map(nid => buildingData.nodes.find(n => n.id === nid))
    .filter(Boolean)
    .map(n => [n.lon, n.lat]);
  if(coords.length < 3) return;
  if(coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1]) coords.push([...coords[0]]);

  const siteGeoJSON = { type:'Feature', geometry:{type:'Polygon',coordinates:[coords]}, properties:{} };

  // Buffer polygon outward ~2m for property boundary estimate
  const propCoords = bufferPolygon(coords, 0.000018); // ~2m at London lat
  const propGeoJSON = { type:'Feature', geometry:{type:'Polygon',coordinates:[propCoords]}, properties:{} };

  // Property boundary — dashed, wider area
  map.addSource('prop-boundary',{type:'geojson',data:propGeoJSON});
  map.addLayer({id:'prop-line',type:'line',source:'prop-boundary',paint:{'line-color':'#e8c44a','line-width':1.2,'line-dasharray':[5,3],'line-opacity':0.6}});

  // Building footprint — solid hairline
  map.addSource('site',{type:'geojson',data:siteGeoJSON});
  map.addLayer({id:'site-fill',type:'fill',source:'site',paint:{'fill-color':'#7c6aef','fill-opacity':.04}});
  map.addLayer({id:'site-line',type:'line',source:'site',paint:{'line-color':'#9d8fff','line-width':1.5,'line-opacity':0.9}});

  const currentHeight = siteInfo.heightM || 6.4;
  const ftf = siteInfo.ftf || 3.2;
  const typicalH = planning.typicalApprovedHeights || planning.typicalHeight || {low:10,mid:20,high:30};
  const potentialHeightM = typicalH.mid || 20;

  // Current building — bright coral, high visibility against dark map
  map.addSource('current-bldg',{type:'geojson',data:siteGeoJSON});
  map.addLayer({
    id:'current-3d',type:'fill-extrusion',source:'current-bldg',
    paint:{
      'fill-extrusion-color':'#ef8b6e',
      'fill-extrusion-height':currentHeight,
      'fill-extrusion-base':0,
      'fill-extrusion-opacity':.88,
      'fill-extrusion-vertical-gradient':false,
    }
  });
  // Strong edge on existing
  map.addLayer({
    id:'current-edge',type:'line',source:'current-bldg',
    paint:{'line-color':'#ef8b6e','line-width':2.5,'line-opacity':0.9}
  });

  // Potential additional envelope — green
  if(potentialHeightM > currentHeight){
    map.addSource('potential-bldg',{type:'geojson',data:siteGeoJSON});
    map.addLayer({
      id:'potential-3d',type:'fill-extrusion',source:'potential-bldg',
      paint:{
        'fill-extrusion-color':'#2dd4a0',
        'fill-extrusion-height':potentialHeightM,
        'fill-extrusion-base':currentHeight,
        'fill-extrusion-opacity':.28,
        'fill-extrusion-vertical-gradient':false,
      }
    });
    // Strong edge on potential
    map.addLayer({
      id:'potential-edge',type:'line',source:'potential-bldg',
      paint:{'line-color':'#2dd4a0','line-width':2,'line-opacity':0.7}
    });

    // Floor lines in the green zone — one per new floor
    const ftfVal = siteInfo.ftf || 3.0;
    const newFloors = Math.floor((potentialHeightM - currentHeight) / ftfVal);
    for(let f = 0; f < newFloors; f++){
      const floorH = currentHeight + (f * ftfVal);
      const floorTop = floorH + 0.15; // thin slab
      const floorId = 'floor-line-' + f;
      map.addSource(floorId, {type:'geojson', data:siteGeoJSON});
      map.addLayer({
        id: floorId, type:'fill-extrusion', source: floorId,
        paint:{
          'fill-extrusion-color':'#2dd4a0',
          'fill-extrusion-height': floorTop,
          'fill-extrusion-base': floorH,
          'fill-extrusion-opacity': 0.6,
        }
      });
    }
  }

  // PD upward extension massing
  if(planning.pdMassingPotential && planning.pdMassingPotential.additionalHeightM > 0){
    const pdTop = currentHeight + planning.pdMassingPotential.additionalHeightM;
    if(pdTop <= potentialHeightM){
      map.addSource('pd-bldg',{type:'geojson',data:siteGeoJSON});
      map.addLayer({
        id:'pd-3d',type:'fill-extrusion',source:'pd-bldg',
        paint:{
          'fill-extrusion-color':'#5aebc2',
          'fill-extrusion-height':pdTop,
          'fill-extrusion-base':currentHeight,
          'fill-extrusion-opacity':.38,
          'fill-extrusion-vertical-gradient':false,
        }
      });
      map.addLayer({
        id:'pd-edge',type:'line',source:'pd-bldg',
        paint:{'line-color':'#5aebc2','line-width':2,'line-opacity':0.6}
      });
    }
  }

  const centroid = getCentroid(coords);

  // Labels — heights only, no capacity label (that's in the panel)
  // Max height label anchored to TOP of potential massing volume
  const potentialFloorCount = Math.round(potentialHeightM / (siteInfo.ftf || 3.0));
  addLabel(centroid, potentialHeightM, `${Math.round(potentialHeightM)}m · ${potentialFloorCount}F max`, 'height-label', 'right');
  // Existing label anchored to top of existing building
  addLabel(centroid, currentHeight, `${Math.round(currentHeight)}m · ${siteInfo.floors}F existing`, 'existing-label', 'left');

  if(planning.pdMassingPotential){
    const pdH = currentHeight + planning.pdMassingPotential.additionalHeightM;
    addLabel(centroid, pdH, `PD: +${planning.pdMassingPotential.additionalFloors}F (${Math.round(pdH)}m)`, 'pd-label', 'right');
  }

  // Resolve collisions after all labels placed
  requestAnimationFrame(() => resolveCollisions());
  document.getElementById('map-legend').style.display = 'block';
}

// --- POLYGON BUFFER (approximate property boundary) ---
function bufferPolygon(coords, dist){
  // Simple outward offset — expand each vertex away from centroid
  const cx = coords.reduce((s,c)=>s+c[0],0) / coords.length;
  const cy = coords.reduce((s,c)=>s+c[1],0) / coords.length;
  return coords.map(c => {
    const dx = c[0] - cx, dy = c[1] - cy;
    const len = Math.sqrt(dx*dx + dy*dy) || 0.00001;
    return [c[0] + (dx/len) * dist, c[1] + (dy/len) * dist];
  });
}

// --- LABELS WITH LEADERS ---
function addLabel(lngLat, heightM, text, className, side){
  const div = document.createElement('div');
  div.className = 'map-label ' + className;
  div.textContent = text;
  div.dataset.lng = lngLat[0];
  div.dataset.lat = lngLat[1];
  div.dataset.heightM = heightM;
  div.dataset.anchorHeightM = heightM; // where the leader line points to
  div.dataset.side = side || 'right';  // which side to offset label to
  div.dataset.offsetX = 0;
  div.dataset.offsetY = 0;
  // Leader SVG
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('leader');
  svg.style.cssText = 'position:absolute;overflow:visible;width:1px;height:1px;left:0;top:0;z-index:-1';
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1','0'); line.setAttribute('y1','0');
  line.setAttribute('x2','0'); line.setAttribute('y2','0');
  svg.appendChild(line);
  div.appendChild(svg);
  // Anchor dot
  const dot = document.createElement('div');
  dot.classList.add('leader-dot');
  div.appendChild(dot);
  document.getElementById('map-labels').appendChild(div);
  currentLabels.push(div);
}

function getAnchorPixel(div){
  const lng = parseFloat(div.dataset.lng);
  const lat = parseFloat(div.dataset.lat);
  const heightM = parseFloat(div.dataset.anchorHeightM);
  const point = map.project(new mapboxgl.LngLat(lng, lat));
  const pitch = map.getPitch() * Math.PI / 180;
  const zoom = map.getZoom();
  const metersPerPixel = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  const heightPixels = heightM / metersPerPixel * Math.cos(pitch);
  return { x: point.x, y: point.y - heightPixels };
}

function positionLabel(div){
  const anchor = getAnchorPixel(div);
  const side = div.dataset.side;
  const mapEl = document.getElementById('map');
  const mapW = mapEl.offsetWidth;
  const mapH = mapEl.offsetHeight;
  const labelW = div.offsetWidth || 120;
  const labelH = div.offsetHeight || 26;
  const pad = 8; // viewport padding

  // Tight offset — labels sit close to massing
  const baseOffset = mapW < 500 ? 40 : 70;
  const labelOffset = side === 'left' ? -baseOffset : baseOffset;
  const ox = parseFloat(div.dataset.offsetX) || 0;
  const oy = parseFloat(div.dataset.offsetY) || 0;
  
  let labelX = anchor.x + labelOffset + ox;
  let labelY = anchor.y + oy;

  // Viewport clamping — keep label fully on screen
  if(side === 'left'){
    // Label extends left from labelX by labelW
    if(labelX - labelW < pad) labelX = pad + labelW;
  } else {
    // Label extends right from labelX by labelW
    if(labelX + labelW > mapW - pad) labelX = mapW - pad - labelW;
  }
  // Vertical clamp
  if(labelY - labelH/2 < pad) labelY = pad + labelH/2;
  if(labelY + labelH/2 > mapH - pad) labelY = mapH - pad - labelH/2;

  div.style.left = labelX + 'px';
  div.style.top = (labelY - labelH/2) + 'px';
  div.style.transform = side === 'left' ? 'translate(-100%,0)' : 'translate(0,0)';
  
  // Leader line from label edge to anchor dot
  const svg = div.querySelector('.leader');
  const line = svg?.querySelector('line');
  if(line){
    const labelEdgeX = side === 'left' ? 0 : 0;
    const labelEdgeY = labelH / 2;
    const anchorRelX = anchor.x - labelX + (side === 'left' ? div.offsetWidth : 0);
    const anchorRelY = anchor.y - (labelY - labelH/2);
    line.setAttribute('x1', labelEdgeX);
    line.setAttribute('y1', labelEdgeY);
    line.setAttribute('x2', anchorRelX);
    line.setAttribute('y2', anchorRelY);
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '3,2');
  }
  // Dot at anchor
  const dot = div.querySelector('.leader-dot');
  if(dot){
    const dotX = anchor.x - labelX - 3 + (side === 'left' ? div.offsetWidth : 0);
    const dotY = anchor.y - (labelY - labelH/2) - 3;
    dot.style.left = dotX + 'px';
    dot.style.top = dotY + 'px';
    dot.style.width = '6px';
    dot.style.height = '6px';
  }
}

function resolveCollisions(){
  if(currentLabels.length < 2) return;
  currentLabels.forEach(positionLabel);
  const minGap = 12;
  // Sort by screen Y position first
  const sorted = [...currentLabels].sort((a,b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);
  for(let pass = 0; pass < 8; pass++){
    let moved = false;
    for(let i = 0; i < sorted.length; i++){
      for(let j = i + 1; j < sorted.length; j++){
        const aRect = sorted[i].getBoundingClientRect();
        const bRect = sorted[j].getBoundingClientRect();
        // Only check same-side labels for vertical collision
        const sameSide = sorted[i].dataset.side === sorted[j].dataset.side;
        if(!sameSide) continue;
        if(aRect.left < bRect.right + minGap && aRect.right + minGap > bRect.left &&
           aRect.top < bRect.bottom + minGap && aRect.bottom + minGap > bRect.top){
          const shift = Math.ceil((aRect.bottom + minGap - bRect.top) / 2) + 6;
          sorted[i].dataset.offsetY = (parseFloat(sorted[i].dataset.offsetY)||0) - shift;
          sorted[j].dataset.offsetY = (parseFloat(sorted[j].dataset.offsetY)||0) + shift;
          positionLabel(sorted[i]);
          positionLabel(sorted[j]);
          moved = true;
        }
      }
    }
    if(!moved) break;
  }
}

function updateLabelPositions(){ 
  currentLabels.forEach(d => { d.dataset.offsetX = 0; d.dataset.offsetY = 0; });
  currentLabels.forEach(positionLabel);
  resolveCollisions();
}
function clearLabels(){ currentLabels.forEach(div => div.remove()); currentLabels = []; }

// --- POWER BARS ---
function renderPowerBar(title, current, potential, pdAdded, unit, showLegend){
  if(!potential || potential <= 0) return '';
  const total = potential;
  const existPct = Math.min(100, (current / total) * 100);
  const addedPct = Math.min(100 - existPct, ((potential - current - (pdAdded||0)) / total) * 100);
  const pdPct = pdAdded ? Math.min(100 - existPct, (pdAdded / total) * 100) : 0;
  return `<div class="power-bar-wrap">
    <div class="power-bar-header">
      <span class="power-bar-title">${title}</span>
      <span class="power-bar-values"><span class="current">${fmt(Math.round(current))}${unit}</span> → <span class="potential">${fmt(Math.round(potential))}${unit}</span></span>
    </div>
    <div class="power-bar">
      <div class="existing" style="width:${existPct}%"></div>
      ${pdPct > 0 ? `<div class="pd-added" style="width:${pdPct}%"></div>` : ''}
      <div class="added" style="width:${Math.max(0,addedPct)}%"></div>
    </div>
    ${showLegend ? `<div class="power-bar-legend"><span class="leg-existing">Existing</span>${pdPct > 0 ? '<span class="leg-pd">PD Extension</span>' : ''}<span class="leg-potential">Planning Potential</span></div>` : ''}
  </div>`;
}

// --- PANEL ---
function renderPanel(planning, address, boroughData, buildingData, siteInfo){
  const borough = planning.borough || boroughData.borough || 'Unknown';
  const shortBorough = borough.replace('London Borough of ','').replace('City of ','').replace('Royal Borough of ','');
  const fin = planning.financials || LONDON_FINANCIALS[2];
  const plotArea = siteInfo.plotArea || 0;
  const plotAreaSqft = plotArea * 10.764;
  const floors = siteInfo.floors || 2;
  const heightM = siteInfo.heightM || 6.4;
  const existingFloorArea = siteInfo.estimatedFloorArea || 0;
  const existingFloorAreaSqft = existingFloorArea * 10.764;
  const isResi = siteInfo.isResidential;
  const ftf = siteInfo.ftf || 3.2;

  const pr = planning.plotRatio || {};
  const remainingCapacity = pr.remainingCapacity || 0;
  const remainingCapacitySqft = remainingCapacity * 10.764;
  const potentialFloorArea = pr.potentialFloorArea || 0;
  const utilPct = potentialFloorArea > 0 ? Math.min(100, (existingFloorArea / potentialFloorArea) * 100) : 0;

  const typicalH = planning.typicalApprovedHeights || {low:10,mid:20,high:30};
  const potentialFloors = Math.floor(typicalH.mid / ftf);

  // Use-class-aware metrics
  const unitEstimate = planning.unitEstimate;
  const affordableUnits = planning.affordableUnits || 0;

  // Financials — use correct rates based on use
  const finRates = isResi ? { rent: fin.rentSqft, sale: fin.saleSqft } : { rent: fin.commercialRentSqft || fin.rentSqft, sale: fin.commercialSaleSqft || fin.saleSqft };
  const constructionCostLow = remainingCapacitySqft * fin.costLow;
  const constructionCostHigh = remainingCapacitySqft * fin.costHigh;
  const landCost = plotAreaSqft * fin.landSqft;
  const saleRevenue = remainingCapacitySqft * finRates.sale;
  const annualRent = remainingCapacitySqft * finRates.rent;
  const cilEstimate = planning.cilEstimate || 0;

  let barColor = 'var(--green)';
  if(utilPct > 55) barColor = 'var(--amber)';
  if(utilPct > 80) barColor = 'var(--red)';

  document.getElementById('p-address').textContent = address.split(',')[0];
  document.getElementById('p-subtitle').textContent = `${shortBorough} · Zone ${planning.zone || '?'}${siteInfo.postcode ? ' · ' + siteInfo.postcode : ''}`;

  // Extra data
  const extra = siteExtraData;
  const floodZone = extra.floodZone || 1;
  const ptal = extra.ptal;
  const inCA = extra.inConservationArea;
  const caName = extra.conservationName;
  const nearbyListed = extra.nearbyListed || [];
  const stations = extra.nearestStations || [];

  // Narrative
  const narrative = generateNarrative(planning, siteInfo, buildingData, fin, utilPct, remainingCapacity, remainingCapacitySqft, potentialFloors, extra);

  // PDR
  let pdrHtml = '';
  if(planning.applicablePDR && planning.applicablePDR.length > 0){
    pdrHtml = planning.applicablePDR.map(p => {
      const blocked = planning.article4Active && p.from === 'E' && p.to === 'C3';
      return `<div style="margin-bottom:10px">
        <span class="pdr-tag ${blocked ? 'restricted' : 'available'}">${p.name}${blocked ? ' — ARTICLE 4' : ''}</span>
        ${p.massingImpact ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5">${p.massingImpact}</div>` : ''}
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${p.notes}${p.maxFloorspace ? ` · Max ${p.maxFloorspace}sqm` : ''}</div>
      </div>`;
    }).join('');
  } else {
    pdrHtml = '<div style="font-size:12px;color:var(--text3)">No PDR routes from current use class</div>';
  }

  // PD massing
  let pdMassingHtml = '';
  if(planning.pdMassingPotential){
    const pd = planning.pdMassingPotential;
    pdMassingHtml = `<div class="stat full highlight-green" style="border-color:var(--green)">
      <div class="stat-label">PD Massing Potential</div>
      <div class="stat-value green">+${pd.additionalFloors} floors (${pd.additionalHeightM}m)</div>
      <div class="stat-sub">${fmt(Math.round(pd.additionalAreaSqm))}sqm · ${pd.notes}</div>
    </div>`;
  }

  // Constraints section
  let constraintsHtml = '';
  // Conservation
  if(inCA){
    constraintsHtml += `<div class="stat full" style="border-color:var(--amber)"><div class="stat-label">Conservation Area</div><div class="stat-value amber">${caName || 'Yes'}</div><div class="stat-sub">PDR restricted · Demolition requires consent · Design scrutiny heightened</div></div>`;
  }
  // Flood zone
  if(floodZone > 1){
    constraintsHtml += `<div class="stat"><div class="stat-label">Flood Zone</div><div class="stat-value ${floodZone >= 3 ? 'red' : 'amber'}">${floodZone}</div><div class="stat-sub">${floodZone >= 3 ? 'Sequential & Exception Test required' : 'Sequential Test may apply'}</div></div>`;
  } else {
    constraintsHtml += `<div class="stat"><div class="stat-label">Flood Zone</div><div class="stat-value green">1</div><div class="stat-sub">Low risk</div></div>`;
  }
  // PTAL
  constraintsHtml += `<div class="stat"><div class="stat-label">PTAL Score</div><div class="stat-value ${ptal >= 4 ? 'green' : (ptal >= 2 ? '' : 'amber')}">${ptal !== null ? ptal + ' (' + (extra.ptalBand || '?') + ')' : 'Unknown'}</div><div class="stat-sub">${ptal >= 5 ? 'Excellent access' : ptal >= 3 ? 'Good access' : 'Moderate/poor access'}</div></div>`;
  // LVMF
  if(planning.lvmfExposure && planning.lvmfExposure !== 'none'){
    constraintsHtml += `<div class="stat"><div class="stat-label">LVMF Exposure</div><div class="stat-value amber" style="font-size:13px;text-transform:capitalize">${planning.lvmfExposure}</div><div class="stat-sub">Protected vista check needed</div></div>`;
  }
  // Listed buildings nearby
  if(nearbyListed.length > 0){
    const grades = nearbyListed.map(l => l.grade).filter(Boolean);
    constraintsHtml += `<div class="stat"><div class="stat-label">Listed Buildings</div><div class="stat-value amber">${nearbyListed.length} nearby</div><div class="stat-sub">${grades.length ? grades.join(', ') : 'Check setting impact'}</div></div>`;
  }
  // Article 4
  if(planning.article4Active){
    constraintsHtml += `<div class="stat full" style="border-color:var(--red)"><div class="stat-label">Article 4 Direction</div><div class="stat-value red" style="font-size:12px">${planning.article4Notes.join('; ')}</div></div>`;
  }
  // Tall building threshold
  if(planning.tallBuildingThreshold){
    constraintsHtml += `<div class="stat"><div class="stat-label">Tall Building</div><div class="stat-value">${planning.tallBuildingThreshold}m+</div><div class="stat-sub">Triggers assessment</div></div>`;
  }

  // Transport
  let transportHtml = '';
  if(stations.length > 0){
    transportHtml = stations.slice(0,5).map(s =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(42,45,66,.3);font-size:12px">
        <span style="color:var(--text2)">${s.name}</span>
        <span style="color:var(--text3);font-family:var(--mono)">${s.distance ? Math.round(s.distance) + 'm' : ''}</span>
      </div>`
    ).join('');
  }

  // Development potential — use-class aware
  let devPotentialHtml = '';
  if(isResi && unitEstimate){
    devPotentialHtml = `
      <div class="stat full highlight-green"><div class="stat-label">Remaining Capacity</div><div class="stat-value green">${fmt(Math.round(remainingCapacity))}sqm (${fmt(Math.round(remainingCapacitySqft))}sqft)</div></div>
      <div class="stat"><div class="stat-label">Est. Units</div><div class="stat-value">${unitEstimate.total}</div><div class="stat-sub">at ~70sqm avg NIA</div></div>
      <div class="stat"><div class="stat-label">Affordable (${Math.round(planning.affordableThreshold*100||35)}%)</div><div class="stat-value">${affordableUnits}</div><div class="stat-sub">${planning.affordableTarget || ''}</div></div>
      <div class="stat"><div class="stat-label">Potential Height</div><div class="stat-value">${typicalH.mid}m</div><div class="stat-sub">~${potentialFloors} floors at ${ftf}m f/f</div></div>
      <div class="stat"><div class="stat-label">Unit Mix</div><div class="stat-value" style="font-size:12px">${unitEstimate.byType ? Object.entries(unitEstimate.byType).map(([k,v])=>`${k}: ${v}`).join(' · ') : '—'}</div></div>
      ${pdMassingHtml}`;
  } else {

// --- NARRATIVE ---
function generateNarrative(planning, siteInfo, buildingData, fin, utilPct, remainingCapacity, remainingCapacitySqft, potentialFloors, extra){
  const plotArea = siteInfo.plotArea || 0;
  const borough = planning.borough?.replace('London Borough of ','').replace('City of ','').replace('Royal Borough of ','') || 'this borough';
  const floors = siteInfo.floors || 2;
  const heightM = siteInfo.heightM || 6.4;
  const existingArea = siteInfo.estimatedFloorArea || 0;
  const isResi = siteInfo.isResidential;
  const uc = planning.useClassInfo || {};

  let html = `<p>A <strong>${fmt(Math.round(plotArea))}sqm</strong> (${fmt(Math.round(plotArea * 10.764))}sqft) site in <strong>${borough}</strong>`;
  if(uc.name) html += `, currently <strong>Use Class ${planning.currentUse}</strong> (${uc.desc})`;
  html += `. The existing structure is approximately <strong>${floors} floors</strong> (${Math.round(heightM)}m) with an estimated <strong>${fmt(Math.round(existingArea))}sqm</strong> GFA.</p>`;

  // Constraints summary
  let constraints = [];
  if(extra.inConservationArea) constraints.push(`within <strong>${extra.conservationName || 'a conservation area'}</strong>`);
  if(extra.floodZone > 1) constraints.push(`<strong>Flood Zone ${extra.floodZone}</strong>`);
  if(extra.nearbyListed?.length > 0) constraints.push(`<strong>${extra.nearbyListed.length} listed building${extra.nearbyListed.length > 1 ? 's' : ''}</strong> nearby`);
  if(planning.lvmfExposure === 'high' || planning.lvmfExposure === 'very high') constraints.push('within <strong>LVMF view corridors</strong>');
  if(planning.article4Active) constraints.push('<strong>Article 4</strong> restrictions apply');

  if(constraints.length > 0){
    html += `<p style="margin-top:8px;color:var(--amber)">⚠ Key constraints: ${constraints.join(', ')}.</p>`;
  }

  // Opportunity
  if(utilPct < 45){
    html += `<div class="opportunity">🏗️ <strong>Significant opportunity.</strong> This site is utilising only <span class="highlight">${utilPct.toFixed(0)}%</span> of estimated plot ratio capacity. `;
    html += `Approximately <strong>${fmt(Math.round(remainingCapacity))}sqm</strong> of additional ${isResi ? 'residential' : 'commercial'} floor area may be achievable`;
    if(planning.unitEstimate && isResi) html += ` — roughly <strong>${planning.unitEstimate.total} units</strong>`;
    html += ` across up to <strong>${potentialFloors} floors</strong>.`;
    if(planning.pdMassingPotential){
      html += ` Under Permitted Development, <strong>+${planning.pdMassingPotential.additionalFloors} floors</strong> (${fmt(Math.round(planning.pdMassingPotential.additionalAreaSqm))}sqm) may be achievable without full planning permission.`;
    }
    html += `</div>`;
  } else if(utilPct < 75){
    html += `<p style="margin-top:8px">At <span class="highlight">${utilPct.toFixed(0)}%</span> utilisation, moderate remaining capacity of <strong>${fmt(Math.round(remainingCapacity))}sqm</strong> ${isResi ? '(~' + (planning.unitEstimate?.total || '?') + ' units)' : 'GFA'}.</p>`;
  } else {
    html += `<p style="margin-top:8px">At <span class="highlight">${utilPct.toFixed(0)}%</span> utilisation, this site is near capacity. Limited additional potential of <strong>${fmt(Math.round(remainingCapacity))}sqm</strong> remains.</p>`;
    if(planning.pdMassingPotential){
      html += `<p style="margin-top:6px;font-size:13px;color:var(--green)">However, PD upward extension may allow <strong>+${planning.pdMassingPotential.additionalFloors} floors</strong> without planning permission.</p>`;
    }
  }

  return html;
}

function renderEPCSection(epcData, siteInfo){
  const certs = epcData.certificates || [];
  if(!certs.length) return;
  // Use most recent certificate
  const cert = certs.sort((a,b) => (b['lodgement-date']||'').localeCompare(a['lodgement-date']||''))[0];
  const rating = cert['current-energy-rating'] || cert['asset-rating-band'] || '?';
  const score = cert['current-energy-efficiency'] || cert['asset-rating'] || '?';
  const potential = cert['potential-energy-rating'] || cert['new-build-benchmark'] || '?';
  const potentialScore = cert['potential-energy-efficiency'] || '';
  const lodgeDate = cert['lodgement-date'] || '?';
  const floorArea = cert['total-floor-area'] || '?';
  const builtForm = cert['built-form'] || cert['property-type'] || '?';
  const wallDesc = cert['walls-description'] || cert['wall-type'] || '';
  const roofDesc = cert['roof-description'] || cert['roof-type'] || '';
  const windowDesc = cert['windows-description'] || cert['glazing-type'] || '';
  const heatingDesc = cert['mainheat-description'] || cert['main-heating-fuel'] || '';
  const co2 = cert['co2-emissions-current'] || '';
  const co2Potential = cert['co2-emissions-potential'] || '';

  // MEES compliance check (Minimum Energy Efficiency Standard)
  const meesRisk = 'FG'.includes(rating) ? 'red' : 'DE'.includes(rating) ? 'amber' : 'green';
  const meesText = 'FG'.includes(rating) 
    ? `<strong>MEES non-compliant</strong> — rating ${rating} is below the E minimum for letting. Cannot be legally let without improvement.`
    : 'DE'.includes(rating)
    ? `Currently compliant (${rating}), but <strong>at risk when MEES tightens to C by 2027-2030</strong>. Upgrade needed.`
    : `Compliant (${rating}). Well-positioned for future MEES tightening.`;

  // Age/renovation estimate
  const ageStr = siteInfo.buildingAge || '';
  const ageNote = ageStr ? `Built/last recorded: <strong>${ageStr}</strong>.` : '';

  // Facade performance inference
  let facadeNote = '';
  if(wallDesc.toLowerCase().includes('cavity') && !wallDesc.toLowerCase().includes('insul')){
    facadeNote = 'Uninsulated cavity walls — <strong>retrofit candidate</strong> (cavity fill ~£8-15/sqm, or EWI ~£80-120/sqm).';
  } else if(wallDesc.toLowerCase().includes('solid')){
    facadeNote = 'Solid wall construction — <strong>internal or external insulation required</strong> (EWI £100-150/sqm, IWI £50-80/sqm). Conservation area may restrict EWI.';
  } else if(wallDesc.toLowerCase().includes('insul')){
    facadeNote = 'Walls already insulated — lower retrofit cost.';
  }

  let windowNote = '';
  if(windowDesc.toLowerCase().includes('single')){
    windowNote = 'Single glazing — <strong>full window replacement needed</strong> (~£400-800/window, or secondary glazing ~£200-400/window).';
  } else if(windowDesc.toLowerCase().includes('double')){
    windowNote = 'Double glazed. May need upgrading to triple for deep retrofit targets.';
  }

  const html = `
    <div class="section" id="epc-section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Adaptive Reuse & Energy</div>
      <div style="display:flex;gap:12px;margin-bottom:12px;align-items:center">
        <div style="font-size:32px;font-weight:800;padding:8px 16px;border-radius:10px;
          background:${rating <= 'B' ? 'rgba(45,212,160,.15)' : rating <= 'D' ? 'rgba(245,183,49,.15)' : 'rgba(239,100,97,.15)'};
          color:${rating <= 'B' ? 'var(--green)' : rating <= 'D' ? 'var(--amber)' : 'var(--red)'}">
          ${rating}
        </div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text)">EPC Rating: ${rating} (${score})</div>
          <div style="font-size:11px;color:var(--text3)">Potential: ${potential}${potentialScore ? ' ('+potentialScore+')' : ''} · Lodged: ${lodgeDate}</div>
          ${floorArea !== '?' ? `<div style="font-size:11px;color:var(--text3)">Certified floor area: ${floorArea}sqm · ${builtForm}</div>` : ''}
        </div>
      </div>
      <div class="constraint-flag ${meesRisk}" style="margin-bottom:10px">${meesText}</div>
      ${co2 ? `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">CO₂: <strong>${co2} t/yr</strong>${co2Potential ? ` → potential ${co2Potential} t/yr` : ''}</div>` : ''}
      ${ageNote ? `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">${ageNote}</div>` : ''}
      ${facadeNote ? `<div class="insight caution"><span class="insight-tag">Facade</span>${facadeNote}</div>` : ''}
      ${windowNote ? `<div class="insight caution"><span class="insight-tag">Glazing</span>${windowNote}</div>` : ''}
      ${heatingDesc ? `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Heating: ${heatingDesc}</div>` : ''}
      ${wallDesc && !facadeNote ? `<div style="font-size:12px;color:var(--text2);margin-bottom:4px">Walls: ${wallDesc}</div>` : ''}
      ${roofDesc ? `<div style="font-size:12px;color:var(--text2);margin-bottom:4px">Roof: ${roofDesc}</div>` : ''}
    </div>`;

  // Insert before the notes section (last section)
  const notesSection = document.querySelector('#panel-body .section:last-child');
  if(notesSection){
    notesSection.insertAdjacentHTML('beforebegin', html);
  } else {
    document.getElementById('panel-body').insertAdjacentHTML('beforeend', html);
  }
}
function extractPostcode(address){
  const match = address.match(/[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}/i);
  return match ? match[0].toUpperCase() : '';
}
function calcPolygonArea(nodes){
  const R = 6371000;
  let area = 0;
  const n = nodes.length;
  for(let i = 0; i < n; i++){
    const j = (i + 1) % n;
    area += (nodes[j].lon - nodes[i].lon) * Math.PI / 180 * (2 + Math.sin(nodes[i].lat * Math.PI / 180) + Math.sin(nodes[j].lat * Math.PI / 180));
  }
  return Math.abs(area * R * R / 2);
}
function getCentroid(coords){
  let sLng = 0, sLat = 0;
  const n = coords.length - 1;
  for(let i = 0; i < n; i++){ sLng += coords[i][0]; sLat += coords[i][1]; }
  return [sLng/n, sLat/n];
}
document.getElementById('toggle').onclick = () => document.getElementById('panel').classList.toggle('collapsed');
init();
</script>
