<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DevFeasibility — London Development Analysis</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c13;--surface:#12141f;--surface2:#1a1d2e;--border:#2a2d42;
  --text:#eef0f6;--text2:#a0a4be;--text3:#6b6f8a;
  --accent:#7c6aef;--accent2:#9d8fff;--accent-glow:rgba(124,106,239,.18);
  --green:#2dd4a0;--green-glow:rgba(45,212,160,.12);
  --amber:#f5b731;--red:#ef6461;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;top:0;left:0;right:0;bottom:0}

/* Search bar */
.search-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;width:min(520px,calc(100vw - 32px))}
.search-wrap input{
  width:100%;padding:14px 20px 14px 44px;border:1px solid var(--border);border-radius:14px;
  background:rgba(18,20,31,.94);backdrop-filter:blur(24px);color:var(--text);font:400 15px var(--sans);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(18,20,31,.97);
  backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:14px;overflow:hidden;
  max-height:260px;overflow-y:auto;display:none;
}
.search-results.show{display:block}
.search-results div{padding:12px 20px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);transition:background .15s;color:var(--text2)}
.search-results div:last-child{border-bottom:none}
.search-results div:hover{background:var(--accent-glow);color:var(--text)}

/* Panel */
.panel{
  position:fixed;top:0;right:0;width:440px;height:100%;background:rgba(10,12,19,.96);
  backdrop-filter:blur(28px);border-left:1px solid var(--border);z-index:5;
  transform:translateX(0);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.panel.collapsed{transform:translateX(100%)}
.panel-toggle{
  position:fixed;right:440px;top:50%;transform:translateY(-50%);z-index:6;
  width:28px;height:56px;background:rgba(18,20,31,.94);border:1px solid var(--border);
  border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--text2);transition:right .35s cubic-bezier(.4,0,.2,1),background .2s;
}
.panel.collapsed~.panel-toggle{right:0}
.panel-toggle:hover{background:var(--surface2);color:var(--text)}
.panel-toggle svg{transition:transform .3s}
.panel.collapsed~.panel-toggle svg{transform:rotate(180deg)}

/* Panel content */
.panel-header{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.panel-header h1{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
.panel-header .address{font-size:21px;font-weight:700;line-height:1.3;color:var(--text)}
.panel-header .subtitle{font-size:13px;color:var(--text2);margin-top:6px}

.section{padding:20px 24px;border-bottom:1px solid var(--border)}
.section-title{
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px
}
.section-title svg{width:14px;height:14px;opacity:.7}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--surface2);border:1px solid rgba(42,45,66,.5);border-radius:10px;padding:14px 16px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.stat-value{font:600 17px var(--mono);color:var(--text)}
.stat-value.accent{color:var(--accent2)}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat.full{grid-column:1/-1}
.stat.highlight{border-color:var(--accent);background:var(--accent-glow)}
.stat.highlight-green{border-color:var(--green);background:var(--green-glow)}

/* Utilization bar */
.util-bar-wrap{margin-top:14px}
.util-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;font-weight:500}
.util-bar{height:10px;background:var(--surface);border-radius:5px;overflow:hidden;position:relative}
.util-bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* Narrative */
.narrative{font-size:14px;line-height:1.75;color:var(--text2)}
.narrative strong{color:var(--text);font-weight:600}
.narrative .highlight{color:var(--accent2);font-weight:600}
.narrative .opportunity{
  margin-top:14px;padding:14px 18px;background:var(--accent-glow);border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0;font-size:13px;line-height:1.7;color:var(--text2);
}
.narrative .opportunity strong{color:var(--text)}

/* Financial table */
.fin-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(42,45,66,.4);font-size:13px;align-items:center}
.fin-row:last-child{border-bottom:none}
.fin-row .label{color:var(--text2)}
.fin-row .value{font:600 13px var(--mono);color:var(--text)}
.fin-row.total{border-top:2px solid var(--border);margin-top:6px;padding-top:14px}
.fin-row.total .label{font-weight:700;color:var(--text)}
.fin-row.total .value{font-weight:700;color:var(--green);font-size:15px}

/* PDR Tag */
.pdr-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:3px 4px 3px 0;letter-spacing:.3px}
.pdr-tag.available{background:var(--green-glow);color:var(--green);border:1px solid rgba(45,212,160,.25)}
.pdr-tag.restricted{background:rgba(239,100,97,.1);color:var(--red);border:1px solid rgba(239,100,97,.2)}

/* Notes */
.note-item{font-size:12px;color:var(--text3);padding:4px 0;line-height:1.5}
.note-item::before{content:'⚠ ';opacity:.6}

/* Loading */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s;
}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;color:var(--text2);font-size:14px}

/* Branding */
.brand{position:fixed;bottom:16px;left:16px;z-index:4;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.brand span{font-weight:700;color:var(--text2)}

/* 3D Labels */
.map-label{
  position:absolute;pointer-events:none;z-index:3;
  font:600 12px var(--mono);color:var(--text);
  background:rgba(10,12,19,.85);backdrop-filter:blur(8px);
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  white-space:nowrap;transform:translate(-50%,-100%);
  transition:opacity .3s;
}
.map-label.height-label{border-color:var(--accent);color:var(--accent2)}
.map-label.capacity-label{border-color:var(--green);color:var(--green)}
.map-label .label-line{
  position:absolute;bottom:-20px;left:50%;width:1px;height:20px;
  background:var(--border);
}

/* Responsive */
@media(max-width:768px){
  .panel{width:100%;border-left:none;border-top:1px solid var(--border);height:55%;top:auto;bottom:0;border-radius:20px 20px 0 0}
  .panel.collapsed{transform:translateY(100%)}
  .panel-toggle{right:auto;left:50%;transform:translateX(-50%);top:auto;bottom:55%;width:56px;height:28px;
    border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none}
  .panel.collapsed~.panel-toggle{bottom:0}
  .panel-toggle svg{transform:rotate(90deg)}
  .panel.collapsed~.panel-toggle svg{transform:rotate(-90deg)}
}
</style>
</head>
<body>
<div class="loading-overlay" id="loader"><div class="loader"></div><p>Loading DevFeasibility…</p></div>

<div id="map"></div>

<!-- 3D Map Labels Container -->
<div id="map-labels"></div>

<div class="search-wrap">
  <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input id="search" type="text" placeholder="Search London address…" autocomplete="off">
  <div class="search-results" id="results"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>DevFeasibility</h1>
    <div class="address" id="p-address">—</div>
    <div class="subtitle" id="p-subtitle"></div>
  </div>
  <div id="panel-body"><div class="section"><p class="narrative" style="color:var(--text3)">Search a London address to begin analysis</p></div></div>
</div>
<button class="panel-toggle" id="toggle" title="Toggle panel">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
</button>

<div class="brand">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  <span>DevFeasibility</span> v4 London
</div>

<script src="london-planning-engine.js"></script>
<script>
let map, marker, currentLabels = [];

async function init(){
  const cfg = await(await fetch('/api/config')).json();
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container:'map',
    style:'mapbox://styles/mapbox/dark-v11',
    center:[-0.08, 51.512],
    zoom:14.5,
    pitch:50,
    bearing:-15,
    antialias:true
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');
  map.on('style.load',()=>{
    // Brighten roads
    try{
      map.setPaintProperty('road-street','line-color','#8a8ea8');
      map.setPaintProperty('road-secondary-tertiary','line-color','#8a8ea8');
      map.setPaintProperty('road-primary','line-color','#a0a4c0');
    }catch(e){}
    // Brighten labels
    ['road-label','road-number-shield'].forEach(l=>{try{map.setPaintProperty(l,'text-color','#d0d4e8')}catch(e){}});
    // 3D buildings
    if(!map.getLayer('3d-buildings')){
      map.addLayer({
        id:'3d-buildings',type:'fill-extrusion',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{
          'fill-extrusion-color':['interpolate',['linear'],['get','height'],0,'#1e2240',30,'#282e55',80,'#353d6a',150,'#424c80'],
          'fill-extrusion-height':['get','height'],
          'fill-extrusion-base':['get','min_height'],
          'fill-extrusion-opacity':.85,
          'fill-extrusion-vertical-gradient':true,
        }
      });
    }
    if(!map.getLayer('building-outlines')){
      map.addLayer({
        id:'building-outlines',type:'line',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{'line-color':'rgba(130,140,180,0.2)','line-width':0.5}
      });
    }
    document.getElementById('loader').classList.add('hide');
    // Demo: Southwark site
    searchAddress('Great Suffolk Street, London SE1');
  });

  // Update labels on camera move
  map.on('move', updateLabelPositions);
}

// --- ADDRESS SEARCH ---
function searchAddress(text){
  document.getElementById('search').value = text;
  fetch(`/api/geocode?text=${encodeURIComponent(text)}`)
    .then(r=>r.json()).then(d=>{
      if(d.features && d.features.length > 0) selectResult(d.features[0]);
    });
}

let debounceTimer;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  const q = e.target.value.trim();
  if(q.length < 3){document.getElementById('results').classList.remove('show');return}
  debounceTimer = setTimeout(()=>{
    fetch(`/api/geocode?text=${encodeURIComponent(q)}`).then(r=>r.json()).then(d=>{
      const el = document.getElementById('results');
      el.innerHTML = '';
      if(d.features && d.features.length){
        d.features.slice(0,5).forEach(f=>{
          const div = document.createElement('div');
          div.textContent = f.place_name;
          div.onclick = ()=>{selectResult(f);el.classList.remove('show');document.getElementById('search').value=f.place_name};
          el.appendChild(div);
        });
        el.classList.add('show');
      } else el.classList.remove('show');
    });
  },300);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('results').classList.remove('show')});

// --- SELECT RESULT ---
async function selectResult(feature){
  const [lng,lat] = feature.center || feature.geometry.coordinates;
  map.flyTo({center:[lng,lat],zoom:16.5,pitch:55,bearing:-15,duration:2000});

  if(marker) marker.remove();
  const el = document.createElement('div');
  el.style.cssText = 'width:16px;height:16px;background:var(--accent);border:3px solid white;border-radius:50%;box-shadow:0 0 16px rgba(124,106,239,.6)';
  marker = new mapboxgl.Marker({element:el}).setLngLat([lng,lat]).addTo(map);

  // Get borough
  const boroughRes = await fetch(`/api/borough?lat=${lat}&lng=${lng}`);
  const boroughData = await boroughRes.json();

  // Get building data from Overpass
  let buildingData = null;
  try {
    const bldgRes = await fetch(`/api/building?lat=${lat}&lng=${lng}&radius=25`);
    const osmData = await bldgRes.json();
    if(osmData.elements && osmData.elements.length > 0){
      const building = osmData.elements.find(e => e.type === 'way' && e.tags);
      if(building){
        buildingData = {
          name: building.tags.name || '',
          levels: parseInt(building.tags['building:levels']) || null,
          height: parseFloat(building.tags.height) || null,
          use: building.tags['building'] || '',
          architect: building.tags.architect || '',
          startDate: building.tags.start_date || '',
          nodes: osmData.elements.filter(e => e.type === 'node' && e.lat),
          wayNodes: building.nodes || []
        };
      }
    }
  } catch(e){ console.warn('No OSM building data:', e); }

  // Get planning context
  const address = feature.place_name || feature.text || '';
  const postcode = extractPostcode(address);
  
  // Estimate plot area from building footprint nodes
  let plotArea = 0;
  if(buildingData && buildingData.nodes.length > 0 && buildingData.wayNodes.length > 0){
    const coords = buildingData.wayNodes.map(nid => buildingData.nodes.find(n => n.id === nid)).filter(Boolean);
    if(coords.length >= 3) plotArea = calcPolygonArea(coords);
  }

  const floors = buildingData?.levels || 2;
  const heightM = buildingData?.height || floors * 3.2;
  const estimatedFloorArea = plotArea * floors * 0.85; // 85% efficiency

  const planning = getPlanningContext(boroughData.borough, {
    lat, lng,
    plotArea: plotArea,
    floorArea: estimatedFloorArea,
    floors: floors,
    currentUse: guessUseClass(buildingData?.use || ''),
  });

  renderPanel(planning, address, boroughData, buildingData, { plotArea, floors, heightM, estimatedFloorArea, lat, lng, postcode });
  renderSite3D(lat, lng, buildingData, planning, { plotArea, floors, heightM });
  document.getElementById('panel').classList.remove('collapsed');
}

// --- 3D SITE RENDERING ---
function renderSite3D(lat, lng, buildingData, planning, siteInfo){
  // Remove old layers
  ['site-fill','site-line','current-3d','potential-3d','setback-line'].forEach(id=>{
    if(map.getLayer(id)) map.removeLayer(id);
  });
  ['site','current-bldg','potential-bldg','setbacks'].forEach(id=>{
    if(map.getSource(id)) map.removeSource(id);
  });
  clearLabels();

  if(!buildingData || !buildingData.wayNodes || buildingData.wayNodes.length < 3) return;

  const coords = buildingData.wayNodes
    .map(nid => buildingData.nodes.find(n => n.id === nid))
    .filter(Boolean)
    .map(n => [n.lon, n.lat]);
  if(coords.length < 3) return;

  // Close the ring
  if(coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1]){
    coords.push([...coords[0]]);
  }

  const siteGeoJSON = {
    type:'Feature',
    geometry:{type:'Polygon',coordinates:[coords]},
    properties:{}
  };

  // Site boundary
  map.addSource('site',{type:'geojson',data:siteGeoJSON});
  map.addLayer({id:'site-fill',type:'fill',source:'site',paint:{'fill-color':'#7c6aef','fill-opacity':.1}});
  map.addLayer({id:'site-line',type:'line',source:'site',paint:{'line-color':'#9d8fff','line-width':2.5,'line-dasharray':[3,1.5]}});

  const currentHeight = siteInfo.heightM || 6.4;
  const typicalH = planning.typicalHeight || {low:10,high:30};
  const potentialHeightM = typicalH.high || 30;

  // Current building — amber
  map.addSource('current-bldg',{type:'geojson',data:siteGeoJSON});
  map.addLayer({
    id:'current-3d',type:'fill-extrusion',source:'current-bldg',
    paint:{
      'fill-extrusion-color':'#f5b731',
      'fill-extrusion-height':currentHeight,
      'fill-extrusion-base':0,
      'fill-extrusion-opacity':.55,
      'fill-extrusion-vertical-gradient':true,
    }
  });

  // Potential envelope — accent/purple
  if(potentialHeightM > currentHeight){
    map.addSource('potential-bldg',{type:'geojson',data:siteGeoJSON});
    map.addLayer({
      id:'potential-3d',type:'fill-extrusion',source:'potential-bldg',
      paint:{
        'fill-extrusion-color':'#7c6aef',
        'fill-extrusion-height':potentialHeightM,
        'fill-extrusion-base':currentHeight,
        'fill-extrusion-opacity':.25,
        'fill-extrusion-vertical-gradient':true,
      }
    });
  }

  // Centroid for labels
  const centroid = getCentroid(coords);

  // Height label
  addLabel(centroid, potentialHeightM + 3, `${Math.round(potentialHeightM)}m max`, 'height-label');
  
  // Current height label
  addLabel(centroid, currentHeight / 2, `${Math.round(currentHeight)}m existing`, '');

  // Capacity label
  if(planning.plotRatio && planning.plotRatio.remainingCapacity > 0){
    const cap = planning.plotRatio.remainingCapacity;
    addLabel(
      [centroid[0] + 0.0002, centroid[1]],
      potentialHeightM * 0.6,
      `+${fmt(Math.round(cap * 10.764))} sqft potential`,
      'capacity-label'
    );
  }
}

// --- 3D LABEL SYSTEM ---
function addLabel(lngLat, heightM, text, className){
  const div = document.createElement('div');
  div.className = 'map-label ' + className;
  div.textContent = text;
  div.dataset.lng = lngLat[0];
  div.dataset.lat = lngLat[1];
  div.dataset.heightM = heightM;
  document.getElementById('map-labels').appendChild(div);
  currentLabels.push(div);
  positionLabel(div);
}

function positionLabel(div){
  const lng = parseFloat(div.dataset.lng);
  const lat = parseFloat(div.dataset.lat);
  const heightM = parseFloat(div.dataset.heightM);
  // Project the 3D point to screen coordinates
  const point = map.project(new mapboxgl.LngLat(lng, lat));
  // Offset Y based on height and pitch
  const pitch = map.getPitch() * Math.PI / 180;
  const zoom = map.getZoom();
  const metersPerPixel = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  const heightPixels = heightM / metersPerPixel * Math.cos(pitch);
  div.style.left = point.x + 'px';
  div.style.top = (point.y - heightPixels) + 'px';
}

function updateLabelPositions(){
  currentLabels.forEach(div => positionLabel(div));
}

function clearLabels(){
  currentLabels.forEach(div => div.remove());
  currentLabels = [];
}

// --- PANEL RENDERING ---
function renderPanel(planning, address, boroughData, buildingData, siteInfo){
  const borough = planning.borough || boroughData.borough || 'Unknown';
  const fin = planning.financials || LONDON_FINANCIALS[2];
  const plotArea = siteInfo.plotArea || 0;
  const plotAreaSqft = plotArea * 10.764;
  const floors = siteInfo.floors || 2;
  const heightM = siteInfo.heightM || 6.4;
  const existingFloorArea = siteInfo.estimatedFloorArea || 0;
  const existingFloorAreaSqft = existingFloorArea * 10.764;

  const pr = planning.plotRatio || {};
  const potentialFloorArea = pr.potentialFloorArea || 0;
  const potentialFloorAreaSqft = potentialFloorArea * 10.764;
  const remainingCapacity = pr.remainingCapacity || 0;
  const remainingCapacitySqft = remainingCapacity * 10.764;
  const utilPct = potentialFloorArea > 0 ? Math.min(100, (existingFloorArea / potentialFloorArea) * 100) : 0;

  // Estimate units
  const avgUnitSqm = 75; // ~800 sqft
  const potentialUnits = Math.floor(remainingCapacity / avgUnitSqm);
  const typicalH = planning.typicalHeight || {low:10,high:30};
  const potentialFloors = Math.floor(typicalH.high / 3.2);

  // Financials
  const constructionCostLow = remainingCapacitySqft * fin.costLow;
  const constructionCostHigh = remainingCapacitySqft * fin.costHigh;
  const landCost = plotAreaSqft * fin.landSqft;
  const saleRevenue = remainingCapacitySqft * fin.saleSqft;
  const annualRent = remainingCapacitySqft * fin.rentSqft;

  let barColor = 'var(--green)';
  if(utilPct > 55) barColor = 'var(--amber)';
  if(utilPct > 80) barColor = 'var(--red)';

  document.getElementById('p-address').textContent = address.split(',')[0];

        <div class="stat"><div class="stat-label">Density Guide</div><div class="stat-value" style="font-size:14px">${planning.density ? planning.density.min + '–' + planning.density.max : '—'}</div><div class="stat-sub">units/ha (${planning.setting || ''})</div></div>
        ${planning.conservationAreas ? '<div class="stat"><div class="stat-label">Conservation</div><div class="stat-value amber" style="font-size:14px">Check Required</div><div class="stat-sub">Borough has conservation areas</div></div>' : ''}
        ${planning.lvmfViews ? '<div class="stat"><div class="stat-label">LVMF Views</div><div class="stat-value amber" style="font-size:14px">May Apply</div><div class="stat-sub">Protected vista check needed</div></div>' : ''}
        ${planning.cilRate ? `<div class="stat"><div class="stat-label">CIL Rate</div><div class="stat-value">£${planning.cilRate}/sqm</div></div>` : ''}
        ${planning.tallBuildingThreshold ? `<div class="stat"><div class="stat-label">Tall Building</div><div class="stat-value">${planning.tallBuildingThreshold}m+</div><div class="stat-sub">Requires assessment</div></div>` : ''}

    <!-- Current Building -->

// --- NARRATIVE ---
function generateNarrative(planning, siteInfo, buildingData, fin, utilPct, remainingCapacitySqft, potentialUnits, potentialFloors){
  const plotAreaSqft = (siteInfo.plotArea || 0) * 10.764;
  const borough = planning.borough?.replace('London Borough of ','').replace('City of ','') || 'this borough';
  const floors = siteInfo.floors || 2;
  const heightM = siteInfo.heightM || 6.4;
  const existingAreaSqft = (siteInfo.estimatedFloorArea || 0) * 10.764;

  let html = `<p>A <strong>${fmt(Math.round(plotAreaSqft))} sqft</strong> site in <strong>${borough}</strong>`;
  if(buildingData?.use) html += ` currently occupied by a <strong>${buildingData.use.replace(/_/g,' ')}</strong> structure`;
  html += `. The existing building is approximately <strong>${floors} floors</strong> (${Math.round(heightM)}m) with an estimated <strong>${fmt(Math.round(existingAreaSqft))} sqft</strong> of floor area.</p>`;

  if(utilPct < 45){
    html += `<div class="opportunity">🏗️ <strong>Significant opportunity.</strong> This site is utilising only <span class="highlight">${utilPct.toFixed(0)}%</span> of its estimated plot ratio capacity. `;
    html += `Approximately <strong>${fmt(Math.round(remainingCapacitySqft))} sqft</strong> of additional development may be possible — enough for roughly <strong>${potentialUnits} residential units</strong> `;
    html += `up to <strong>${potentialFloors} floors</strong>.`;
    if(planning.conservationAreas) html += ` <strong>Conservation area check required</strong> — may constrain.`;
    if(planning.lvmfViews) html += ` LVMF strategic views may apply.`;
    html += `</div>`;
  } else if(utilPct < 75){
    html += `<p style="margin-top:8px">At <span class="highlight">${utilPct.toFixed(0)}% plot ratio utilisation</span>, there is moderate remaining capacity of <strong>${fmt(Math.round(remainingCapacitySqft))} sqft</strong>, `;
    html += `potentially accommodating <strong>${potentialUnits} additional units</strong>.</p>`;
  } else {
    html += `<p style="margin-top:8px">At <span class="highlight">${utilPct.toFixed(0)}%</span> utilisation, this site is near its estimated capacity. `;
    html += `Limited additional development potential of <strong>${fmt(Math.round(remainingCapacitySqft))} sqft</strong> remains.</p>`;
  }

  // PDR note
  if(planning.applicablePDR && planning.applicablePDR.length > 0){
    html += `<p style="margin-top:8px;font-size:13px;color:var(--text3)">Permitted development routes may apply — see PDR section below.</p>`;
  }

  return html;
}

// --- UTILITIES ---
function fmt(n){return Math.round(n).toLocaleString('en-GB')}

function extractPostcode(address){
  const match = address.match(/[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}/i);
  return match ? match[0].toUpperCase() : '';
}

function guessUseClass(osmType){
  const map = {
    'residential': 'C3', 'apartments': 'C3', 'house': 'C3', 'detached': 'C3', 'terrace': 'C3',
    'commercial': 'E', 'retail': 'E', 'office': 'E', 'shop': 'E',
    'industrial': 'B2', 'warehouse': 'B8',
    'hotel': 'C1', 'church': 'F1', 'school': 'F1',
    'yes': 'E', '': 'E'
  };
  return map[osmType.toLowerCase()] || 'E';
}

function calcPolygonArea(nodes){
  // Haversine-based polygon area from lat/lng nodes
  const R = 6371000; // Earth radius in meters
  let area = 0;
  const n = nodes.length;
  for(let i = 0; i < n; i++){
    const j = (i + 1) % n;
    const lat1 = nodes[i].lat * Math.PI / 180;
    const lat2 = nodes[j].lat * Math.PI / 180;
    const lng1 = nodes[i].lon * Math.PI / 180;
    const lng2 = nodes[j].lon * Math.PI / 180;
    area += (lng2 - lng1) * (2 + Math.sin(lat1) + Math.sin(lat2));
  }
  area = Math.abs(area * R * R / 2);
  return area;
}

function getCentroid(coords){
  let sumLng = 0, sumLat = 0;
  const n = coords.length - 1; // Exclude closing point
  for(let i = 0; i < n; i++){
    sumLng += coords[i][0];
    sumLat += coords[i][1];
  }
  return [sumLng/n, sumLat/n];
}

// Panel toggle
document.getElementById('toggle').onclick = () => document.getElementById('panel').classList.toggle('collapsed');

init();
</script>
