<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DevFeasibility — NYC Development Analysis</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#161923;--surface2:#1e2130;--border:#2a2d3e;
  --text:#e8eaf0;--text2:#9a9db5;--text3:#6b6e85;
  --indigo:#6366f1;--indigo2:#818cf8;--indigo-glow:rgba(99,102,241,.15);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;top:0;left:0;right:0;bottom:0}

/* Search bar */
.search-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;width:min(480px,calc(100vw - 32px))}
.search-wrap input{
  width:100%;padding:14px 20px 14px 44px;border:1px solid var(--border);border-radius:12px;
  background:rgba(22,25,35,.92);backdrop-filter:blur(20px);color:var(--text);font:400 15px var(--sans);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-glow)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(22,25,35,.96);
  backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  max-height:240px;overflow-y:auto;display:none;
}
.search-results.show{display:block}
.search-results div{padding:12px 20px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);transition:background .15s}
.search-results div:last-child{border-bottom:none}
.search-results div:hover{background:var(--indigo-glow)}

/* Panel */
.panel{
  position:fixed;top:0;right:0;width:420px;height:100%;background:rgba(15,17,23,.95);
  backdrop-filter:blur(24px);border-left:1px solid var(--border);z-index:5;
  transform:translateX(0);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.panel.collapsed{transform:translateX(100%)}
.panel-toggle{
  position:fixed;right:420px;top:50%;transform:translateY(-50%);z-index:6;
  width:28px;height:56px;background:rgba(22,25,35,.92);border:1px solid var(--border);
  border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--text2);transition:right .35s cubic-bezier(.4,0,.2,1),background .2s;
}
.panel.collapsed~.panel-toggle{right:0}
.panel-toggle:hover{background:var(--surface2);color:var(--text)}
.panel-toggle svg{transition:transform .3s}
.panel.collapsed~.panel-toggle svg{transform:rotate(180deg)}

/* Panel content */
.panel-header{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.panel-header h1{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--indigo2);margin-bottom:4px}
.panel-header .address{font-size:20px;font-weight:700;line-height:1.3}
.panel-header .subtitle{font-size:13px;color:var(--text2);margin-top:4px}

.section{padding:20px 24px;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title svg{width:14px;height:14px;opacity:.6}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--surface2);border-radius:10px;padding:14px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font:600 18px var(--mono);color:var(--text)}
.stat-value.indigo{color:var(--indigo2)}
.stat-value.green{color:var(--green)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat.full{grid-column:1/-1}

/* Utilization bar */
.util-bar-wrap{margin-top:12px}
.util-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.util-bar{height:8px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative}
.util-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

/* Narrative */
.narrative{font-size:14px;line-height:1.7;color:var(--text2)}
.narrative strong{color:var(--text);font-weight:600}
.narrative .highlight{color:var(--indigo2);font-weight:600}
.narrative .opportunity{
  margin-top:12px;padding:12px 16px;background:var(--indigo-glow);border-left:3px solid var(--indigo);
  border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;
}

/* Financial table */
.fin-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(42,45,62,.5);font-size:13px}
.fin-row:last-child{border-bottom:none}
.fin-row .label{color:var(--text2)}
.fin-row .value{font:500 13px var(--mono);color:var(--text)}
.fin-row.total{border-top:2px solid var(--border);margin-top:4px;padding-top:12px}
.fin-row.total .label,.fin-row.total .value{font-weight:700;color:var(--text)}

/* Loading */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s;
}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;color:var(--text2);font-size:14px}

/* Branding */
.brand{position:fixed;bottom:16px;left:16px;z-index:4;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.brand span{font-weight:700;color:var(--text2)}

/* Responsive */
@media(max-width:768px){
  .panel{width:100%;border-left:none;border-top:1px solid var(--border);height:55%;top:auto;bottom:0;border-radius:20px 20px 0 0}
  .panel.collapsed{transform:translateY(100%)}
  .panel-toggle{right:auto;left:50%;transform:translateX(-50%);top:auto;bottom:55%;width:56px;height:28px;
    border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none}
  .panel.collapsed~.panel-toggle{bottom:0}
  .panel-toggle svg{transform:rotate(90deg)}
  .panel.collapsed~.panel-toggle svg{transform:rotate(-90deg)}
}
</style>
</head>
<body>
<div class="loading-overlay" id="loader"><div class="loader"></div><p>Loading DevFeasibility…</p></div>

<div id="map"></div>

<div class="search-wrap">
  <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input id="search" type="text" placeholder="Search NYC address…" autocomplete="off">
  <div class="search-results" id="results"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>DevFeasibility</h1>
    <div class="address" id="p-address">—</div>
    <div class="subtitle" id="p-subtitle"></div>
  </div>
  <div id="panel-body"><div class="section"><p class="narrative" style="color:var(--text3)">Search an address to begin analysis</p></div></div>
</div>
<button class="panel-toggle" id="toggle" title="Toggle panel">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
</button>

<div class="brand">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  <span>DevFeasibility</span> v2
</div>

<script>
let map, marker, currentData = null;

const BOROUGH_RATES = {
  1: {name:'Manhattan',rentSqft:75,saleSqft:1400,costLow:280,costHigh:380},
  2: {name:'Bronx',rentSqft:40,saleSqft:500,costLow:180,costHigh:280},
  3: {name:'Brooklyn',rentSqft:60,saleSqft:950,costLow:220,costHigh:330},
  4: {name:'Queens',rentSqft:50,saleSqft:700,costLow:200,costHigh:300},
  5: {name:'Staten Island',rentSqft:38,saleSqft:450,costLow:180,costHigh:260},
};

const ZONE_INFO = {
  'R': {type:'Residential',desc:'residential development',color:'#818cf8'},
  'C': {type:'Commercial',desc:'commercial or mixed-use development',color:'#34d399'},
  'M': {type:'Manufacturing',desc:'manufacturing, industrial, or commercial development',color:'#fbbf24'},
};

async function init(){
  const cfg = await(await fetch('/api/config')).json();
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container:'map',
    style:'mapbox://styles/mapbox/dark-v11',
    center:[-73.965,40.686],
    zoom:15.5,
    pitch:50,
    bearing:-17,
    antialias:true
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');
  map.on('style.load',()=>{
    // Brighten streets
    try{
      map.setPaintProperty('road-street','line-color','#8a8ea8');
      map.setPaintProperty('road-secondary-tertiary','line-color','#8a8ea8');
      map.setPaintProperty('road-primary','line-color','#a0a4c0');
    }catch(e){}
    // Brighten labels
    const labelLayers=['road-label','road-number-shield','road-exit-shield'];
    labelLayers.forEach(l=>{try{map.setPaintProperty(l,'text-color','#d0d4e8')}catch(e){}});
    // 3D buildings
    if(!map.getLayer('3d-buildings')){
      map.addLayer({
        id:'3d-buildings',type:'fill-extrusion',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{
          'fill-extrusion-color':['interpolate',['linear'],['get','height'],'#1a1d2e',50,'#252840',200,'#2e3255'],
          'fill-extrusion-height':['get','height'],
          'fill-extrusion-base':['get','min_height'],
          'fill-extrusion-opacity':.7,
          'fill-extrusion-vertical-gradient':true,
        }
      });
    }
    // Building outlines via separate layer
    if(!map.getLayer('building-outlines')){
      map.addLayer({
        id:'building-outlines',type:'line',source:'composite','source-layer':'building',
        minzoom:14,
        paint:{'line-color':'rgba(130,140,180,0.25)','line-width':0.5}
      });
    }
    document.getElementById('loader').classList.add('hide');
    // Pre-load demo
    searchAddress('880 Lafayette Avenue, Brooklyn, NY');
  });
}

function searchAddress(text){
  document.getElementById('search').value = text;
  fetch(`/api/geocode?text=${encodeURIComponent(text)}`)
    .then(r=>r.json()).then(d=>{
      if(d.features&&d.features.length>0) selectResult(d.features[0]);
    });
}

let debounceTimer;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  const q=e.target.value.trim();
  if(q.length<3){document.getElementById('results').classList.remove('show');return}
  debounceTimer=setTimeout(()=>{
    fetch(`/api/geocode?text=${encodeURIComponent(q)}`).then(r=>r.json()).then(d=>{
      const el=document.getElementById('results');
      el.innerHTML='';
      if(d.features&&d.features.length){
        d.features.slice(0,5).forEach(f=>{
          const div=document.createElement('div');
          div.textContent=f.properties.label;
          div.onclick=()=>{selectResult(f);el.classList.remove('show');document.getElementById('search').value=f.properties.label};
          el.appendChild(div);
        });
        el.classList.add('show');
      } else el.classList.remove('show');
    });
  },250);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('results').classList.remove('show')});

async function selectResult(feature){
  const [lng,lat]=feature.geometry.coordinates;
  const props=feature.properties;
  map.flyTo({center:[lng,lat],zoom:16.5,pitch:55,bearing:-17,duration:2000});
  if(marker)marker.remove();
  const el=document.createElement('div');
  el.style.cssText='width:16px;height:16px;background:var(--indigo);border:3px solid white;border-radius:50%;box-shadow:0 0 12px rgba(99,102,241,.6)';
  marker=new mapboxgl.Marker({element:el}).setLngLat([lng,lat]).addTo(map);

  // Get BBL from props
  const pad = props.pad_bbl || props.addendum?.pad?.bbl;
  const borough = props.borough_gid?.split(':')?.[1] || props.region_a;
  let bbl = pad;
  if(!bbl && props.locality === 'Brooklyn') bbl = null; // will need PLUTO lookup another way

  // Try fetching PLUTO by address components
  let plutoData = null;
  if(bbl){
    const pr = await fetch(`/api/pluto?bbl=${bbl}`);
    const pd = await pr.json();
    if(pd.length) plutoData = pd[0];
  }
  if(!plutoData){
    // Try finding via geocoded BBL in addendum
    const addBbl = props.addendum?.pad?.bbl;
    if(addBbl){
      const pr = await fetch(`/api/pluto?bbl=${addBbl}`);
      const pd = await pr.json();
      if(pd.length) plutoData = pd[0];
    }
  }

  if(plutoData){
    currentData = plutoData;
    renderPanel(plutoData, props.label || props.name);
    loadLotGeometry(plutoData.bbl, plutoData);
  } else {
    document.getElementById('p-address').textContent = props.label || props.name;
    document.getElementById('p-subtitle').textContent = '';
    document.getElementById('panel-body').innerHTML = '<div class="section"><p class="narrative">No PLUTO data found for this address.</p></div>';
  }
  // open panel
  document.getElementById('panel').classList.remove('collapsed');
}

async function loadLotGeometry(bbl, plutoData){
  // Remove old layers
  ['lot-fill','lot-line','envelope-3d'].forEach(id=>{
    if(map.getLayer(id))map.removeLayer(id);
  });
  if(map.getSource('lot'))map.removeSource('lot');
  if(map.getSource('envelope'))map.removeSource('envelope');

  try{
    const r = await fetch(`/api/lot-geom?bbl=${bbl}`);
    const gj = await r.json();
    if(gj.features && gj.features.length){
      const lotFeature = gj.features[0];
      map.addSource('lot',{type:'geojson',data:lotFeature});
      map.addLayer({id:'lot-fill',type:'fill',source:'lot',paint:{'fill-color':'#6366f1','fill-opacity':.15}});
      map.addLayer({id:'lot-line',type:'line',source:'lot',paint:{'line-color':'#818cf8','line-width':2,'line-dasharray':[2,1]}});

      // Buildable envelope
      const lotArea = parseFloat(plutoData.lotarea) || 1;
      const maxFar = parseFloat(plutoData.maxallwfar) || parseFloat(plutoData.residfar) || 1;
      const maxBuildable = lotArea * maxFar;
      const lotCoverage = 0.65; // typical lot coverage
      const footprint = lotArea * lotCoverage;
      const floors = Math.ceil(maxBuildable / footprint);
      const height = floors * 3.05; // meters (10ft per floor)

      const envelopeData = JSON.parse(JSON.stringify(lotFeature));
      envelopeData.properties = {height: height, base: 0};
      map.addSource('envelope',{type:'geojson',data:envelopeData});
      map.addLayer({
        id:'envelope-3d',type:'fill-extrusion',source:'envelope',
        paint:{
          'fill-extrusion-color':'#6366f1',
          'fill-extrusion-height':height,
          'fill-extrusion-base':0,
          'fill-extrusion-opacity':.25,
          'fill-extrusion-vertical-gradient':true,
        }
      });
    }
  }catch(e){console.warn('No lot geometry:',e)}
}

function renderPanel(d, address){
  const lotArea = parseFloat(d.lotarea)||0;
  const bldgArea = parseFloat(d.bldgarea)||0;
  const resFar = parseFloat(d.residfar)||0;
  const comFar = parseFloat(d.commfar)||0;
  const maxFar = parseFloat(d.maxallwfar)||Math.max(resFar,comFar)||0;
  const builtFar = parseFloat(d.builtfar)||0;
  const numFloors = parseFloat(d.numfloors)||0;
  const yearBuilt = d.yearbuilt||'—';
  const zoneDist = d.zonedist1||'—';
  const landUse = d.landuse||'';
  const bbl = d.bbl||'';
  const boroCode = parseInt(bbl.charAt(0))||3;
  const rates = BOROUGH_RATES[boroCode]||BOROUGH_RATES[3];
  const maxBuildable = lotArea * maxFar;
  const remainingSF = Math.max(0, maxBuildable - bldgArea);
  const utilPct = maxBuildable > 0 ? Math.min(100, (bldgArea/maxBuildable)*100) : 0;
  const lotCoverage = 0.65;
  const potentialFloors = maxBuildable > 0 ? Math.ceil(maxBuildable / (lotArea * lotCoverage)) : 0;
  const potentialHeight = potentialFloors * 10;
  const unitCount850 = Math.floor(maxBuildable / 850);
  const unitCount650 = Math.floor(maxBuildable / 650);
  const existingUnits = parseInt(d.unitsres)||0;
  const costLow = remainingSF * rates.costLow;
  const costHigh = remainingSF * rates.costHigh;
  const revRentAnnual = remainingSF * rates.rentSqft;
  const revSale = remainingSF * rates.saleSqft;

  const zonePrefix = zoneDist.charAt(0);
  const zi = ZONE_INFO[zonePrefix] || ZONE_INFO['R'];

  document.getElementById('p-address').textContent = address;
  document.getElementById('p-subtitle').textContent = `BBL ${bbl} · ${rates.name}`;

  // Utilization bar color
  let barColor = 'var(--green)';
  if(utilPct>60) barColor = 'var(--amber)';
  if(utilPct>85) barColor = 'var(--red)';

  const isUnderbuilt = utilPct < 50;
  const narrative = generateNarrative(d, rates, zi, utilPct, maxBuildable, remainingSF, unitCount850, potentialFloors);

  document.getElementById('panel-body').innerHTML = `
    <!-- Summary -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>Site Opportunity</div>
      <div class="narrative">${narrative}</div>
    </div>

    <!-- Zoning -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Zoning</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">District</div><div class="stat-value indigo">${zoneDist}</div><div class="stat-sub">${zi.type}</div></div>
        <div class="stat"><div class="stat-label">Max FAR</div><div class="stat-value">${maxFar.toFixed(2)}</div><div class="stat-sub">Built: ${builtFar.toFixed(2)}</div></div>
        <div class="stat"><div class="stat-label">Res. FAR</div><div class="stat-value">${resFar.toFixed(2)}</div></div>
        <div class="stat"><div class="stat-label">Comm. FAR</div><div class="stat-value">${comFar.toFixed(2)}</div></div>
      </div>
      <div class="util-bar-wrap">
        <div class="util-bar-label"><span style="color:var(--text3)">FAR Utilization</span><span style="font-family:var(--mono);font-weight:600;color:${barColor}">${utilPct.toFixed(0)}%</span></div>
        <div class="util-bar"><div class="util-bar-fill" style="width:${utilPct}%;background:${barColor}"></div></div>
      </div>
    </div>

    <!-- Current Building -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M13 21V3l6 4v14"/><path d="M9 9v.01M9 13v.01M9 17v.01"/></svg>Current Building</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Building Area</div><div class="stat-value">${fmt(bldgArea)} sf</div></div>
        <div class="stat"><div class="stat-label">Lot Area</div><div class="stat-value">${fmt(lotArea)} sf</div></div>
        <div class="stat"><div class="stat-label">Floors</div><div class="stat-value">${numFloors}</div></div>
        <div class="stat"><div class="stat-label">Year Built</div><div class="stat-value">${yearBuilt}</div></div>
        <div class="stat"><div class="stat-label">Existing Units</div><div class="stat-value">${existingUnits}</div></div>
        <div class="stat"><div class="stat-label">Land Use</div><div class="stat-value" style="font-size:13px">${getLandUse(landUse)}</div></div>
      </div>
    </div>

    <!-- Development Potential -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>Development Potential</div>
      <div class="stat-grid">
        <div class="stat full"><div class="stat-label">Max Buildable (Lot × FAR)</div><div class="stat-value indigo">${fmt(lotArea)} × ${maxFar.toFixed(2)} = ${fmt(maxBuildable)} sf</div></div>
        <div class="stat"><div class="stat-label">Remaining Capacity</div><div class="stat-value green">${fmt(remainingSF)} sf</div></div>
        <div class="stat"><div class="stat-label">Max Envelope Height</div><div class="stat-value">${potentialHeight} ft</div><div class="stat-sub">${potentialFloors} floors</div></div>
        <div class="stat"><div class="stat-label">Est. Units (850sf avg)</div><div class="stat-value">${unitCount850}</div></div>
        <div class="stat"><div class="stat-label">Est. Studios (650sf)</div><div class="stat-value">${unitCount650}</div></div>
      </div>
    </div>

    <!-- Financials -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Financial Estimates</div>
      <div class="fin-row"><span class="label">Construction Cost (low)</span><span class="value">$${fmt(costLow)}</span></div>
      <div class="fin-row"><span class="label">Construction Cost (high)</span><span class="value">$${fmt(costHigh)}</span></div>
      <div class="fin-row"><span class="label">Cost/sqft range</span><span class="value">$${rates.costLow}–$${rates.costHigh}</span></div>
      <div class="fin-row"><span class="label">Annual Rental Revenue</span><span class="value">$${fmt(revRentAnnual)}/yr</span></div>
      <div class="fin-row"><span class="label">Avg rent/sqft</span><span class="value">$${rates.rentSqft}/sf/yr</span></div>
      <div class="fin-row total"><span class="label">Sale Revenue Potential</span><span class="value">$${fmt(revSale)}</span></div>
      <div class="fin-row"><span class="label">Avg sale price</span><span class="value">$${rates.saleSqft}/sf</span></div>
    </div>
  `;
}

function generateNarrative(d, rates, zi, utilPct, maxBuildable, remainingSF, unitCount850, potentialFloors){
  const lotArea = parseFloat(d.lotarea)||0;
  const bldgArea = parseFloat(d.bldgarea)||0;
  const zoneDist = d.zonedist1||'Unknown';
  const yearBuilt = d.yearbuilt||'unknown';
  const maxFar = parseFloat(d.maxallwfar)||parseFloat(d.residfar)||0;

  let html = `<p>This <strong>${fmt(lotArea)} sqft</strong> lot in <strong>${rates.name}</strong> is zoned <strong>${zoneDist}</strong>, permitting ${zi.desc}. `;
  html += `The current structure, built in <strong>${yearBuilt}</strong>, contains <strong>${fmt(bldgArea)} sqft</strong> across <strong>${parseFloat(d.numfloors)||0} floors</strong>.</p>`;

  if(utilPct < 50){
    html += `<div class="opportunity">🏗️ <strong>Significant opportunity.</strong> This site is using only <span class="highlight">${utilPct.toFixed(0)}%</span> of its zoning capacity. `;
    html += `Approximately <strong>${fmt(remainingSF)} sqft</strong> of additional development is possible — enough for roughly <strong>${unitCount850} residential units</strong> `;
    html += `in a building up to <strong>${potentialFloors} floors</strong>.</div>`;
  } else if(utilPct < 80){
    html += `<p style="margin-top:8px">The site is at <span class="highlight">${utilPct.toFixed(0)}% FAR utilization</span>. There is moderate remaining capacity of <strong>${fmt(remainingSF)} sqft</strong>, `;
    html += `potentially accommodating <strong>${unitCount850} additional units</strong>.</p>`;
  } else {
    html += `<p style="margin-top:8px">At <span class="highlight">${utilPct.toFixed(0)}% utilization</span>, this site is near its zoning capacity. `;
    html += `Only <strong>${fmt(remainingSF)} sqft</strong> of additional development potential remains.</p>`;
  }
  return html;
}

function fmt(n){return Math.round(n).toLocaleString('en-US')}
function getLandUse(code){
  const uses={'01':'1-2 Family','02':'Multi-Family Walk-up','03':'Multi-Family Elevator','04':'Mixed Res/Comm',
    '05':'Commercial/Office','06':'Industrial/Mfg','07':'Transportation/Utility','08':'Public Facility',
    '09':'Open Space','10':'Parking','11':'Vacant Land'};
  return uses[code]||code||'—';
}

document.getElementById('toggle').onclick=()=>document.getElementById('panel').classList.toggle('collapsed');
