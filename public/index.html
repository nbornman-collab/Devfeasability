<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Dev Feasibility</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --text2: #8888a0;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
  }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }
  
  #app {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: 100vh;
  }
  
  /* SIDEBAR */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  #header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  
  #header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  
  #header h1 span { color: var(--accent2); }
  
  #header p {
    font-size: 12px;
    color: var(--text2);
    font-weight: 400;
  }
  
  /* SEARCH */
  #search-box {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  
  #search-wrap {
    display: flex;
    gap: 8px;
  }
  
  #search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text2); }
  
  #search-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  
  #search-btn:hover { background: var(--accent2); }
  
  /* PANEL */
  #panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    text-align: center;
    gap: 12px;
  }
  
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; line-height: 1.6; }
  
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* DATA DISPLAY */
  .lot-address {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  
  .lot-meta {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text2);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  
  .section-title:first-of-type { margin-top: 0; }
  
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  
  .card.full { grid-column: 1 / -1; }
  
  .card-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  
  .card-value {
    font-size: 18px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.5px;
  }
  
  .card-value.small { font-size: 14px; }
  .card-value.green { color: var(--green); }
  .card-value.amber { color: var(--amber); }
  .card-value.red { color: var(--red); }
  
  /* UTILIZATION BAR */
  .util-bar-wrap { margin-top: 6px; }
  
  .util-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  
  .util-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease;
  }
  
  /* MAP */
  #map {
    width: 100%;
    height: 100%;
  }
  
  .leaflet-container { background: var(--bg); }
  
  /* RESPONSIVE */
  @media (max-width: 800px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="header">
      <h1><span>●</span> NYC Dev Feasibility</h1>
      <p>Real estate development capacity analysis</p>
    </div>
    <div id="search-box">
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Search NYC address..." value="880 Lafayette Avenue Brooklyn">
        <button id="search-btn">Search</button>
      </div>
    </div>
    <div id="panel">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <p>Search an address or click the map<br>to analyze development feasibility</p>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
const map = L.map('map', {
  zoomControl: false
}).setView([40.6892, -73.9554], 13);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO',
  maxZoom: 20
}).addTo(map);

let marker = null;

function setMarker(lat, lng) {
  if (marker) map.removeLayer(marker);
  marker = L.circleMarker([lat, lng], {
    radius: 8, fillColor: '#6366f1', fillOpacity: 0.9,
    color: '#818cf8', weight: 2
  }).addTo(map);
  map.flyTo([lat, lng], 17, { duration: 1 });
}

function fmt(n) {
  if (n == null || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return n;
  return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function renderPanel(d) {
  const lot = parseFloat(d.lotarea) || 0;
  const bldg = parseFloat(d.bldgarea) || 0;
  const floors = parseFloat(d.numfloors) || 0;
  const units = parseFloat(d.unitsres) || 0;
  const farRes = parseFloat(d.residfar) || 0;
  const farCom = parseFloat(d.commfar) || 0;
  const farFac = parseFloat(d.facilfar) || 0;
  const maxFar = Math.max(farRes, farCom, farFac);
  const builtFar = lot > 0 ? bldg / lot : 0;
  const maxBuildable = lot * maxFar;
  const remaining = Math.max(0, maxBuildable - bldg);
  const utilPct = maxBuildable > 0 ? (bldg / maxBuildable) * 100 : 0;
  const assessed = parseFloat(d.assesstot) || 0;
  const yearBuilt = d.yearbuilt || '—';
  
  const utilColor = utilPct > 90 ? 'red' : utilPct > 60 ? 'amber' : 'green';
  const barColor = utilPct > 90 ? '#f87171' : utilPct > 60 ? '#fbbf24' : '#34d399';
  
  const addr = d.address || '—';
  const borough = {1:'Manhattan',2:'Bronx',3:'Brooklyn',4:'Queens',5:'Staten Island'}[d.borough] || '';
  const zone = d.zonedist1 || '—';

  document.getElementById('panel').innerHTML = `
    <div class="lot-address">${addr}</div>
    <div class="lot-meta">${borough} · BBL ${d.bbl} · Zone ${zone}</div>
    
    <div class="section-title">Development Capacity</div>
    <div class="grid">
      <div class="card full">
        <div class="card-label">FAR Utilization</div>
        <div class="card-value ${utilColor}">${fmt(utilPct.toFixed(1))}%</div>
        <div class="util-bar-wrap">
          <div class="util-bar"><div class="util-bar-fill" style="width:${Math.min(utilPct,100)}%;background:${barColor}"></div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Max Buildable</div>
        <div class="card-value small">${fmt(maxBuildable)} sf</div>
      </div>
      <div class="card">
        <div class="card-label">Remaining</div>
        <div class="card-value small ${remaining > 0 ? 'green' : 'red'}">${fmt(remaining)} sf</div>
      </div>
      <div class="card">
        <div class="card-label">Built FAR</div>
        <div class="card-value small">${builtFar.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-label">Max FAR</div>
        <div class="card-value small">${maxFar.toFixed(2)}</div>
      </div>
    </div>
    
    <div class="section-title">FAR Breakdown</div>
    <div class="grid">
      <div class="card">
        <div class="card-label">Residential FAR</div>
        <div class="card-value small">${fmt(farRes)}</div>
      </div>
      <div class="card">
        <div class="card-label">Commercial FAR</div>
        <div class="card-value small">${fmt(farCom)}</div>
      </div>
      <div class="card">
        <div class="card-label">Facility FAR</div>
        <div class="card-value small">${fmt(farFac)}</div>
      </div>
      <div class="card">
        <div class="card-label">Lot Area</div>
        <div class="card-value small">${fmt(lot)} sf</div>
      </div>
    </div>
    
    <div class="section-title">Current Building</div>
    <div class="grid">
      <div class="card">
        <div class="card-label">Building Area</div>
        <div class="card-value small">${fmt(bldg)} sf</div>
      </div>
      <div class="card">
        <div class="card-label">Floors</div>
        <div class="card-value small">${fmt(floors)}</div>
      </div>
      <div class="card">
        <div class="card-label">Residential Units</div>
        <div class="card-value small">${fmt(units)}</div>
      </div>
      <div class="card">
        <div class="card-label">Year Built</div>
        <div class="card-value small">${yearBuilt}</div>
      </div>
    </div>
    
    <div class="section-title">Valuation</div>
    <div class="grid">
      <div class="card full">
        <div class="card-label">Total Assessed Value</div>
        <div class="card-value">$${fmt(assessed)}</div>
      </div>
    </div>
  `;
}

async function searchAddress(text) {
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const geoRes = await fetch(`/api/geocode?text=${encodeURIComponent(text)}`);
    const geo = await geoRes.json();
    
    if (!geo.features || !geo.features.length) {
      panel.innerHTML = '<div class="empty-state"><p>No results found for that address.</p></div>';
      return;
    }
    
    const feat = geo.features[0];
    const [lng, lat] = feat.geometry.coordinates;
    const props = feat.properties;
    
    // Build BBL from pad_bbl or components
    let bbl = props.addendum?.pad?.bbl || props.pad_bbl;
    if (!bbl && props.borough_gid) {
      const boro = props.borough_gid.replace('whosonfirst:borough:', '');
      // fallback: try label search
    }
    
    if (!bbl) {
      panel.innerHTML = '<div class="empty-state"><p>Could not determine BBL for this address.</p></div>';
      return;
    }
    
    setMarker(lat, lng);
    
    const plutoRes = await fetch(`/api/pluto?bbl=${bbl}`);
    const pluto = await plutoRes.json();
    
    if (!pluto.length) {
      panel.innerHTML = '<div class="empty-state"><p>No PLUTO data found for BBL ' + bbl + '</p></div>';
      return;
    }
    
    renderPanel(pluto[0]);
  } catch (e) {
    panel.innerHTML = '<div class="empty-state"><p>Error: ' + e.message + '</p></div>';
  }
}

// Map click -> reverse geocode
map.on('click', async (e) => {
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  setMarker(e.latlng.lat, e.latlng.lng);
  
  try {
    const res = await fetch(`/api/reverse?lat=${e.latlng.lat}&lng=${e.latlng.lng}`);
    const geo = await res.json();
    
    if (!geo.features || !geo.features.length) {
      panel.innerHTML = '<div class="empty-state"><p>No lot found at this location.</p></div>';
      return;
    }
    
    const feat = geo.features[0];
    const bbl = feat.properties.addendum?.pad?.bbl || feat.properties.pad_bbl;
    
    if (!bbl) {
      panel.innerHTML = '<div class="empty-state"><p>No BBL data at this location.</p></div>';
      return;
    }
    
    const plutoRes = await fetch(`/api/pluto?bbl=${bbl}`);
    const pluto = await plutoRes.json();
    
    if (!pluto.length) {
      panel.innerHTML = '<div class="empty-state"><p>No PLUTO data for BBL ' + bbl + '</p></div>';
      return;
    }
    
    renderPanel(pluto[0]);
    document.getElementById('search-input').value = feat.properties.label || '';
  } catch (e) {
    panel.innerHTML = '<div class="empty-state"><p>Error: ' + e.message + '</p></div>';
  }
});

// Search handlers
document.getElementById('search-btn').addEventListener('click', () => {
  const v = document.getElementById('search-input').value.trim();
  if (v) searchAddress(v);
});

document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const v = e.target.value.trim();
    if (v) searchAddress(v);
  }
});

// Load default
searchAddress('880 Lafayette Avenue Brooklyn');
</script>
</body>
</html>
