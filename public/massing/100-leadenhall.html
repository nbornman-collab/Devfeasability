<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&A Studio — 100 Leadenhall Street — Massing Options</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e14;--surface:#161822;--surface2:#1e2030;--surface3:#262840;
  --border:#2a2d42;--text:#e8e9f0;--text2:#9498b3;--text3:#626680;
  --accent:#818cf8;--green:#34d399;--green2:#059669;
  --red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;inset:0;right:min(640px,33vw)}

.topbar{position:fixed;top:0;left:0;right:min(640px,33vw);z-index:10;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(12,14,20,.95) 0%,transparent 100%);pointer-events:none}
.topbar>*{pointer-events:auto}
.logo{font:800 16px var(--sans);color:var(--text)}
.logo span{color:var(--accent)}

.options-bar{position:fixed;top:70px;left:24px;z-index:10;display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.opt-btn{padding:10px 16px;border:none;border-radius:9px;font:600 11px var(--sans);cursor:pointer;transition:all .2s;background:transparent;color:var(--text3);letter-spacing:0.3px}
.opt-btn:hover{color:var(--text2);background:var(--surface2)}
.opt-btn.active{color:white;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.opt-btn.opt-a.active{background:#059669}
.opt-btn.opt-b.active{background:#6366f1}
.opt-btn.opt-c.active{background:#d97706;color:#1a1d2e}
.opt-btn.opt-e.active{background:#dc2626}
.opt-btn.opt-x.active{background:var(--surface3);border:1px solid var(--border);color:var(--text2)}
.opt-btn .sub{display:block;font:400 8px var(--sans);margin-top:1px;opacity:.7}

/* Panel */
.panel{position:fixed;top:0;right:0;width:min(640px,33vw);height:100%;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden;z-index:5}
.panel-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:2}
.panel-header h1{font:800 10px var(--sans);text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:6px}
.panel-header .address{font:700 20px var(--sans);color:var(--text);line-height:1.3}
.panel-header .subtitle{font:400 12px var(--sans);color:var(--text3);margin-top:3px}

.scheme-header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.scheme-name{font:800 15px var(--sans);color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.scheme-desc{font:300 12px var(--sans);color:var(--text3)}

.hero-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.hero-metric{text-align:center;padding:16px 10px;background:var(--surface)}
.hero-metric .label{font:600 8px var(--sans);text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:4px}
.hero-metric .value{font:800 22px var(--mono);letter-spacing:-0.5px}

.section{padding:16px 24px;border-bottom:1px solid var(--border)}
.section-title{font:700 9px var(--sans);text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px}

.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-label{font:400 12px var(--sans);color:var(--text3)}
.stat-value{font:600 12px var(--mono);color:var(--text)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.accent{color:var(--accent)}
.stat-value.amber{color:var(--amber)}

.risk{display:inline-block;padding:3px 10px;border-radius:4px;font:600 9px var(--sans);text-transform:uppercase;letter-spacing:0.5px}
.risk.low{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.risk.medium{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.risk.high{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}

.brief{font:400 12px/1.7 var(--sans);color:var(--text2)}
.brief strong{color:var(--text);font-weight:600}

.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font:500 10px var(--sans);color:var(--text3);margin-bottom:3px}
.bar-track{height:18px;background:var(--surface3);border-radius:4px;overflow:hidden;display:flex}
.bar-fill{height:100%;display:flex;align-items:center;justify-content:center;font:600 7px var(--mono);color:white;padding:0 4px;white-space:nowrap;overflow:hidden}

.proforma{width:100%;border-collapse:collapse}
.proforma td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2)}
.proforma td:last-child{text-align:right;font-family:var(--mono);font-weight:500;color:var(--text)}
.proforma tr.total td{border-top:1px solid var(--text3);border-bottom:none;padding-top:8px;font-weight:700;font-size:13px;color:var(--text)}
.proforma tr.total td:last-child{color:var(--green)}

/* Floor plan */
.fp-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;padding:12px}
.fp-wrap svg{display:block;width:100%;height:auto}
.fp-meta{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.fp-tag{font:500 9px var(--sans);color:var(--text3);background:var(--surface3);padding:2px 8px;border-radius:3px;display:flex;align-items:center;gap:4px}
.fp-tag .swatch{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Compare grid */
.compare-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);margin-bottom:1px}
.compare-col{background:var(--surface);padding:12px}
.compare-col.header{background:var(--surface2);padding:10px 12px}
.compare-label-col{background:var(--surface);padding:8px 24px;display:flex;align-items:center}
.compare-row{display:grid;grid-template-columns:35% 21.67% 21.67% 21.67%;gap:1px;background:var(--border);margin-bottom:1px}
.compare-row>div{background:var(--bg);padding:8px 12px;font-size:11px}
.compare-row>div:first-child{background:var(--surface);color:var(--text3);font-size:11px}
.compare-row.row-header>div{background:var(--surface2);font:700 10px var(--sans);text-transform:uppercase;letter-spacing:1px;color:var(--text3)}

.export-btn{display:block;width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font:700 12px var(--sans);cursor:pointer;text-align:center;letter-spacing:0.5px}
.export-btn:hover{background:#6366f1}

@media(max-width:900px){
  #map{right:0;bottom:50%}
  .topbar{right:0}
  .panel{width:100%;height:50%;top:auto;bottom:0;border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="logo">D&A <span>Studio</span></div>
</div>

<div class="options-bar">
  <button class="opt-btn opt-a active" onclick="selectOption(0)">Option A<span class="sub">10F Conservative</span></button>
  <button class="opt-btn opt-b" onclick="selectOption(1)">Option B<span class="sub">14F Mid-Rise</span></button>
  <button class="opt-btn opt-c" onclick="selectOption(2)">Option C<span class="sub">22F Tower</span></button>
  <button class="opt-btn opt-e" onclick="selectOption(3)">Existing<span class="sub">6F Current</span></button>
  <button class="opt-btn opt-x" onclick="selectOption(4)">Compare<span class="sub">All Options</span></button>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>Massing Options</h1>
    <div class="address">100 Leadenhall Street</div>
    <div class="subtitle">City of London · EC3A 3BP · Zone 1 · PTAL 6a</div>
  </div>
  <div id="panel-body"></div>
</div>

<script>
const SITE_COORDS = [[-0.0802763,51.5140146],[-0.0800595,51.5139875],[-0.0798747,51.51396],[-0.0799754,51.5136468],[-0.079809,51.5136257],[-0.0798425,51.5135377],[-0.0798828,51.513445],[-0.0804144,51.5135131],[-0.0803568,51.5136783],[-0.0802864,51.5136687],[-0.0802571,51.5137575],[-0.080298,51.5137608],[-0.0802591,51.5138813],[-0.0803085,51.5138886],[-0.0803056,51.5138968],[-0.0802763,51.5140146]];
const CENTROID = [-0.0801551,51.5137673];
const PLOT_AREA = 1551;
const EXISTING_HEIGHT = 25;
const EXISTING_FLOORS = 6;
const FTF = 4.2;
const M_PER_LNG = 69270;
const M_PER_LAT = 111320;

const fmt = n => n?.toLocaleString('en-GB') ?? '—';

const OPTION_COLORS = {
  a:{main:'#34d399',fill:'#059669',edge:'#34d399'},
  b:{main:'#818cf8',fill:'#6366f1',edge:'#a5b4fc'},
  c:{main:'#fbbf24',fill:'#d97706',edge:'#fbbf24'},
  existing:{main:'#f87171',fill:'#dc2626',edge:'#f87171'}
};

const OPTIONS = [
  {
    key:'a', name:'Option A — Conservative', desc:'10-storey podium with upper setback',
    height:42,floors:10,podiumFloors:6,podiumHeight:25,towerFloors:4,towerFootprintPct:0.65,
    setbackM:3, coverage:0.80, niaEfficiency:0.82, costSqft:380, saleSqft:1250,
    risk:'low', riskLabel:'Low Planning Risk',
    planningNotes:'Within established height envelope. Minimal impact on protected views. Pre-app likely to receive positive feedback from City planners.',
    layout:'Full floor plate to 6F matching existing street wall. Upper 4 floors step back 3m south/east. Central core with perimeter Grade A offices. Active ground floor retail/lobby (1,020 sqm).',
    staircase:'Dual staircase (BSA — >18m)', breeam:'BREEAM Excellent',
    floorNote:'L1-6: 1,241 sqm NIA/floor · L7-10: 807 sqm NIA/floor (setback)',
  },
  {
    key:'b', name:'Option B — Mid-Rise', desc:'14-storey stepped massing with sky terrace',
    height:60,floors:14,podiumFloors:6,podiumHeight:25,towerFloors:8,towerFootprintPct:0.55,
    setbackM:4, coverage:0.80, niaEfficiency:0.80, costSqft:400, saleSqft:1307,
    risk:'medium', riskLabel:'Medium Planning Risk',
    planningNotes:'At typical approved height for this area. LVMF protected view assessment required (St Paul\'s sightlines). Wind microclimate study needed. Good precedent from nearby approvals.',
    layout:'6F podium at full plate. 8F tower steps back 3m south, 2m east — sky terrace at L7. Central core, dual aspect floors (~680 sqm NIA/floor). Active ground floor.',
    staircase:'Dual staircase + firefighter lift', breeam:'BREEAM Outstanding',
    floorNote:'L1-6: 1,241 sqm NIA/floor · L7-14: 680 sqm NIA/floor (setback)',
  },
  {
    key:'c', name:'Option C — Tower', desc:'22-storey slender commercial tower',
    height:92,floors:22,podiumFloors:4,podiumHeight:17,towerFloors:18,towerFootprintPct:0.40,
    setbackM:8, coverage:0.75, niaEfficiency:0.77, costSqft:450, saleSqft:1450,
    risk:'high', riskLabel:'High Planning Risk',
    planningNotes:'Exceeds typical height — exceptional design quality required. Full LVMF, wind, daylight/sunlight studies. GLA referral likely. Strong urban design and public benefit case needed.',
    layout:'Low 4F podium (17m) with public realm at ground. Slender 18F tower at 40% coverage. Sky lobby at L12. Premium upper floors with panoramic views. Crown treatment required.',
    staircase:'Dual staircase + 2× firefighter lifts', breeam:'BREEAM Outstanding + Net Zero',
    floorNote:'L1-4: 1,163 sqm NIA/floor · L5-22: 465 sqm NIA/floor (tower)',
  }
];

OPTIONS.forEach(opt => {
  const podiumGross = PLOT_AREA * opt.coverage * opt.podiumFloors;
  const towerGross = PLOT_AREA * opt.towerFootprintPct * opt.coverage * opt.towerFloors;
  const grossArea = podiumGross + towerGross;
  const nia = grossArea * opt.niaEfficiency;
  const existingNia = PLOT_AREA * 0.80 * 0.82 * EXISTING_FLOORS;
  const addedNia = Math.max(0, nia - existingNia);
  const addedNiaSqft = addedNia * 10.764;
  const constructionCost = addedNiaSqft * opt.costSqft;
  const fees = constructionCost * 0.12;
  const cil = addedNia * 186;
  const finance = constructionCost * 0.07 * 2.5;
  const totalCost = constructionCost + fees + cil + finance;
  const gdv = addedNiaSqft * opt.saleSqft;
  const margin = gdv - totalCost;
  opt.nia = Math.round(nia);
  opt.existingNia = Math.round(existingNia);
  opt.addedNia = Math.round(addedNia);
  opt.addedNiaSqft = Math.round(addedNiaSqft);
  opt.constructionCost = Math.round(constructionCost);
  opt.fees = Math.round(fees);
  opt.cil = Math.round(cil);
  opt.finance = Math.round(finance);
  opt.totalCost = Math.round(totalCost);
  opt.gdv = Math.round(gdv);
  opt.margin = Math.round(margin);
  opt.marginPct = gdv > 0 ? (margin/gdv*100).toFixed(0) : '0';
});

// ─── Principal building axis — AABB dominant direction ──────────────────────
// Uses the axis-aligned bounding box to determine which direction the mass
// is elongated. Simple, predictable, not skewed by polygon irregularity.
// Returns { angle (SVG degrees: 90=N-S, 0=E-W), elongation (h/w or w/h) }
// Rotation applied as rotate(angle-90°): N-S→0°, E-W→-90°.
function buildingPrincipalAxis() {
  const lons = SITE_COORDS.map(c=>c[0]);
  const lats = SITE_COORDS.map(c=>c[1]);
  const widthM  = (Math.max(...lons)-Math.min(...lons))*M_PER_LNG;
  const heightM = (Math.max(...lats)-Math.min(...lats))*M_PER_LAT;
  if(heightM >= widthM){
    return { angle:90, elongation:heightM/widthM }; // N-S dominant
  } else {
    return { angle:0, elongation:widthM/heightM }; // E-W dominant
  }
}

// ─── SVG floor plan generator ───────────────────────────────────────────────
// Core sizing: 22% of GIA (vetted by Nic 2026-03-13)
// Core position: driven by polygon shape + views, not just centred
// Core ROTATED to building primary axis (not due north)
// Tower core: aligns 2 faces to podium below, reduces on other 2
// Satellite stair: in re-entrant SW corner
function makePlanSVG(opt, level='podium') {
  const lons = SITE_COORDS.map(c=>c[0]);
  const lats = SITE_COORDS.map(c=>c[1]);
  const lonMin=Math.min(...lons), lonMax=Math.max(...lons);
  const latMin=Math.min(...lats), latMax=Math.max(...lats);
  const widthM=(lonMax-lonMin)*M_PER_LNG;
  const heightM=(latMax-latMin)*M_PER_LAT;
  const VW=200, VH=Math.round(VW*heightM/widthM);
  const pad=20;
  const scaleX=(VW-pad*2)/widthM;
  const scaleY=(VH-pad*2)/heightM;

  function px(lon,lat){
    return [(lon-lonMin)*M_PER_LNG*scaleX+pad, VH-((lat-latMin)*M_PER_LAT*scaleY+pad)];
  }

  const isTower = level==='tower';
  const isExisting = opt.key==='existing';
  const col = isExisting ? OPTION_COLORS.existing : OPTION_COLORS[opt.key];
  const footprintFactor = isTower ? Math.sqrt(opt.towerFootprintPct||1) : 1;

  // Centroid
  const cxLon = SITE_COORDS.reduce((s,c)=>s+c[0],0)/SITE_COORDS.length;
  const cyLat = SITE_COORDS.reduce((s,c)=>s+c[1],0)/SITE_COORDS.length;

  // Building footprint
  const bldgCoords = SITE_COORDS.map(c=>[cxLon+(c[0]-cxLon)*footprintFactor*0.95, cyLat+(c[1]-cyLat)*footprintFactor*0.95]);
  const sitePts = SITE_COORDS.map(c=>px(c[0],c[1]).join(',')).join(' ');
  const bldgPts = bldgCoords.map(c=>px(c[0],c[1]).join(',')).join(' ');

  // ── CORE SIZING (22% GIA — vetted) ────────────────────────────────────
  const plateGIA = PLOT_AREA * (isTower ? opt.towerFootprintPct||1 : 1) * (opt.coverage||0.80);
  const podiumGIA = PLOT_AREA * (opt.coverage||0.80); // always needed for tower alignment
  const coreGIA = plateGIA * 0.22;
  const podiumCoreGIA = podiumGIA * 0.22;

  // ── BUILDING AXIS via PCA (dominant mass direction, not just longest edge) ─
  const { angle: axisAngle, elongation } = buildingPrincipalAxis();
  // Core aspect ratio shaped to match the building's principal elongation.
  // If building is elongated 1.4:1, core is ~1.3:1 in same direction.
  // Clamped 1.2–2.4 to stay buildable (min 7m on short face enforced by area).
  const coreAspect = Math.min(Math.max(elongation * 0.85, 1.2), 2.4);
  const coreWm = Math.sqrt(coreGIA / coreAspect);
  const coreHm = coreWm * coreAspect;
  const podiumCoreWm = Math.sqrt(podiumCoreGIA / coreAspect);
  const podiumCoreHm = podiumCoreWm * coreAspect;

  // ── CORE POSITION ─────────────────────────────────────────────────────
  // Primary elevation: north (Leadenhall St) + east (cluster views) → protect as NIA
  // Core offset toward SW interior — away from prime faces
  // Tower core: pins NE corner to match podium below, reduces SW
  const coreOffsetLon = (lonMax-lonMin) * 0.05;
  const coreOffsetLat = (latMax-latMin) * 0.04;
  const coreLon = cxLon - coreOffsetLon * 0.3; // slight west of centroid
  const coreLat = cyLat - coreOffsetLat * 0.2; // slight south of centroid
  const [cpx, cpy] = px(coreLon, coreLat);
  const cw = coreWm * scaleX;
  const ch = coreHm * scaleY;
  const podiumCw = podiumCoreWm * scaleX;
  const podiumCh = podiumCoreHm * scaleY;

  // Tower core: align NE corner (primary lease faces) to podium, reduce SW
  // In local rotated frame: right face stays, top face stays → shrink left & bottom
  const twCw = cw;  // width in rotated frame (already from towerFootprintPct GIA)
  const twCh = ch;
  // Offset in rotated frame so NE corner matches podium NE corner
  // podium NE corner = (podiumCw/2, -podiumCh/2) in local frame
  // tower NE corner = (twCw/2, -twCh/2) in local frame — pin these
  const twOffX = (podiumCw - twCw) / 2; // shift left by reduction amount
  const twOffY = (twCh - podiumCh) / 2; // shift down by reduction amount

  // ── SATELLITE STAIR (SW re-entrant — awkward corner) ──────────────────
  // SW of polygon = lowest lat + most negative lon area
  const satLon = lonMin + (lonMax-lonMin)*0.1;
  const satLat = latMin + (latMax-latMin)*0.15;
  const [spx, spy] = px(satLon, satLat);
  const satSize = Math.max(podiumCw * 0.5, 9);

  // ── LEASE SPAN (E face: core edge → perimeter) ─────────────────────────
  // East face of core → east perimeter (primary lease direction)
  const coreEdgeLon = coreLon + coreWm/2 / M_PER_LNG;
  const perimLon = lonMax - (lonMax-lonMin)*0.04;
  const leaseSpanM = Math.round(Math.max(0,(perimLon - coreEdgeLon) * M_PER_LNG));
  const leaseOk = leaseSpanM >= 7;

  // ── SETBACK LINE ───────────────────────────────────────────────────────
  let setbackPts = '';
  if (!isTower && !isExisting && (opt.towerFloors||0) > 0) {
    const sf = Math.sqrt(opt.towerFootprintPct) * 0.95;
    setbackPts = SITE_COORDS.map(c=>px(cxLon+(c[0]-cxLon)*sf, cyLat+(c[1]-cyLat)*sf).join(',')).join(' ');
  }

  // ── STRUCTURAL GRID (9m, rotated with building) ────────────────────────
  // Grid drawn in rotated space via SVG transform on a group
  const gridSpacingPxX = 9 * scaleX;
  const gridSpacingPxY = 9 * scaleY;
  let grid = '';
  for(let gx=-200; gx<400; gx+=gridSpacingPxX)
    grid += `<line x1="${gx.toFixed(0)}" y1="-200" x2="${gx.toFixed(0)}" y2="400" stroke="${col.edge}" stroke-width="0.3" opacity="0.15" stroke-dasharray="1,5"/>`;
  for(let gy=-200; gy<400; gy+=gridSpacingPxY)
    grid += `<line x1="-200" y1="${gy.toFixed(0)}" x2="400" y2="${gy.toFixed(0)}" stroke="${col.edge}" stroke-width="0.3" opacity="0.15" stroke-dasharray="1,5"/>`;

  // ── LEASE DIM LINE (unrotated, horizontal) ────────────────────────────
  const lsX1 = cpx + (isTower ? twCw/2 + twOffX : podiumCw/2) * Math.cos(axisAngle*Math.PI/180);
  const lsX2 = px(perimLon, coreLat)[0];
  const lsY = cpy - podiumCh/2 - 5;

  const nax=VW-13, nay=13;
  const clipId = `clip-${opt.key||'ex'}-${isTower?'t':'p'}`;
  const floorLabel = isTower ? `L${opt.podiumFloors+1}–${opt.floors} TOWER` : isExisting ? `L1–${EXISTING_FLOORS} EXISTING` : `L1–${opt.podiumFloors} PODIUM`;

  // Core rect coordinates in local (rotated) frame
  // Podium: centred
  // Tower: pin NE corner → offset SW
  const coreLocalX = isTower ? -podiumCw/2 + twOffX : -podiumCw/2;
  const coreLocalY = isTower ? -podiumCh/2 + twOffY : -podiumCh/2;
  const coreRectW  = isTower ? twCw : podiumCw;
  const coreRectH  = isTower ? twCh : podiumCh;
  const coreSqm    = Math.round(isTower ? coreGIA : podiumCoreGIA);

  return `<svg viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="${clipId}"><polygon points="${bldgPts}"/></clipPath>
  </defs>
  <rect width="${VW}" height="${VH}" fill="var(--surface2)"/>
  <!-- structural grid — rotated to building axis, clipped to footprint -->
  <g clip-path="url(#${clipId})">

let map, currentOption = 0;

async function init(){
  const cfg = await(await fetch('/api/config')).json();
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container:'map', style:'mapbox://styles/mapbox/dark-v11',
    center:CENTROID, zoom:17.2, pitch:60, bearing:-20, antialias:true
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');

  map.on('style.load',()=>{
    map.addLayer({
      id:'3d-buildings',type:'fill-extrusion',source:'composite','source-layer':'building',minzoom:14,
      paint:{
        'fill-extrusion-color':['interpolate',['linear'],['get','height'],0,'#1a1d2e',30,'#22253a',80,'#2a2d45',150,'#333650'],
        'fill-extrusion-height':['get','height'],
        'fill-extrusion-base':['get','min_height'],
        'fill-extrusion-opacity':0.6,'fill-extrusion-vertical-gradient':true,
      }
    });

    map.addSource('site',{type:'geojson',data:{type:'Feature',geometry:{type:'Polygon',coordinates:[SITE_COORDS]}}});
    map.addLayer({id:'site-line',type:'line',source:'site',paint:{'line-color':'#818cf8','line-width':2,'line-opacity':0.9,'line-dasharray':[4,2]}});
    map.addLayer({id:'site-glow',type:'line',source:'site',paint:{'line-color':'#818cf8','line-width':8,'line-opacity':0.15,'line-blur':4}});

    map.addSource('podium',{type:'geojson',data:emptyPoly()});
    map.addSource('tower',{type:'geojson',data:emptyPoly()});
    map.addLayer({id:'podium-3d',type:'fill-extrusion',source:'podium',paint:{'fill-extrusion-color':'#059669','fill-extrusion-height':25,'fill-extrusion-base':0,'fill-extrusion-opacity':0.65}});
    map.addLayer({id:'tower-3d',type:'fill-extrusion',source:'tower',paint:{'fill-extrusion-color':'#059669','fill-extrusion-height':42,'fill-extrusion-base':25,'fill-extrusion-opacity':0.55}});
    map.addLayer({id:'podium-edge',type:'line',source:'podium',paint:{'line-color':'#34d399','line-width':2,'line-opacity':0.8}});
    map.addLayer({id:'tower-edge',type:'line',source:'tower',paint:{'line-color':'#34d399','line-width':2,'line-opacity':0.8}});

    for(let f=1;f<=30;f++){
      map.addSource('fl'+f,{type:'geojson',data:emptyPoly()});
      map.addLayer({id:'fl'+f,type:'fill-extrusion',source:'fl'+f,paint:{'fill-extrusion-color':'#fff','fill-extrusion-height':0,'fill-extrusion-base':0,'fill-extrusion-opacity':0}});
    }
    selectOption(0);
  });
}

function emptyPoly(){return {type:'Feature',geometry:{type:'Polygon',coordinates:[[[0,0],[0,0.0001],[0.0001,0.0001],[0,0]]]}};}

function bufferPoly(coords,dist){
  const cx=coords.reduce((s,c)=>s+c[0],0)/coords.length;
  const cy=coords.reduce((s,c)=>s+c[1],0)/coords.length;
  return coords.map(c=>{const dx=c[0]-cx,dy=c[1]-cy,l=Math.sqrt(dx*dx+dy*dy)||1e-9;return[c[0]+dx/l*dist,c[1]+dy/l*dist]});
}
function shrinkPoly(coords,f){
  const cx=coords.reduce((s,c)=>s+c[0],0)/coords.length;
  const cy=coords.reduce((s,c)=>s+c[1],0)/coords.length;
  return coords.map(c=>[cx+(c[0]-cx)*f,cy+(c[1]-cy)*f]);
}

function selectOption(idx){
  currentOption=idx;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  for(let f=1;f<=30;f++) map.setPaintProperty('fl'+f,'fill-extrusion-opacity',0);

  if(idx===4){renderComparePanel();return;}

  if(idx===3){
    const col=OPTION_COLORS.existing;
    map.getSource('podium').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000004)]}});
    map.getSource('tower').setData(emptyPoly());
    map.setPaintProperty('podium-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('podium-3d','fill-extrusion-height',EXISTING_HEIGHT);
    map.setPaintProperty('podium-3d','fill-extrusion-base',0);
    map.setPaintProperty('podium-3d','fill-extrusion-opacity',0.5);
    map.setPaintProperty('tower-3d','fill-extrusion-opacity',0);
    map.setPaintProperty('podium-edge','line-color',col.edge);
    map.setPaintProperty('tower-edge','line-opacity',0);
    for(let f=1;f<=EXISTING_FLOORS;f++){
      const h=f*FTF;
      map.getSource('fl'+f).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000005)]}});
      map.setPaintProperty('fl'+f,'fill-extrusion-color',col.edge);
      map.setPaintProperty('fl'+f,'fill-extrusion-height',h+0.15);
      map.setPaintProperty('fl'+f,'fill-extrusion-base',h-0.15);
      map.setPaintProperty('fl'+f,'fill-extrusion-opacity',0.5);
    }
    renderExistingPanel();
  } else {
    const opt=OPTIONS[idx], col=OPTION_COLORS[opt.key];
    map.getSource('podium').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000004)]}});
    map.setPaintProperty('podium-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('podium-3d','fill-extrusion-height',opt.podiumHeight);
    map.setPaintProperty('podium-3d','fill-extrusion-base',0);
    map.setPaintProperty('podium-3d','fill-extrusion-opacity',0.65);
    map.setPaintProperty('podium-edge','line-color',col.edge);
    map.setPaintProperty('podium-edge','line-opacity',0.8);
    const tCoords=shrinkPoly(SITE_COORDS,Math.sqrt(opt.towerFootprintPct));
    map.getSource('tower').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[tCoords]}});
    map.setPaintProperty('tower-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('tower-3d','fill-extrusion-height',opt.height);
    map.setPaintProperty('tower-3d','fill-extrusion-base',opt.podiumHeight);
    map.setPaintProperty('tower-3d','fill-extrusion-opacity',0.55);
    map.setPaintProperty('tower-edge','line-color',col.edge);
    map.setPaintProperty('tower-edge','line-opacity',0.8);
    let fi=1;
    for(let f=1;f<=opt.podiumFloors;f++){
      const h=f*FTF;
      map.getSource('fl'+fi).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000005)]}});
      map.setPaintProperty('fl'+fi,'fill-extrusion-color',col.edge);
      map.setPaintProperty('fl'+fi,'fill-extrusion-height',h+0.15);
      map.setPaintProperty('fl'+fi,'fill-extrusion-base',h-0.15);
      map.setPaintProperty('fl'+fi,'fill-extrusion-opacity',0.5);
      fi++;
    }
    for(let f=1;f<=opt.towerFloors;f++){
      const h=opt.podiumHeight+f*FTF;
      const tc=shrinkPoly(SITE_COORDS,Math.sqrt(opt.towerFootprintPct));
      map.getSource('fl'+fi).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(tc,0.000003)]}});
      map.setPaintProperty('fl'+fi,'fill-extrusion-color',col.edge);
      map.setPaintProperty('fl'+fi,'fill-extrusion-height',h+0.15);
      map.setPaintProperty('fl'+fi,'fill-extrusion-base',h-0.15);
      map.setPaintProperty('fl'+fi,'fill-extrusion-opacity',0.4);
      fi++;
    }
    renderOptionPanel(opt);
  }
}
