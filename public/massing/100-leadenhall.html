<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&A Studio — 100 Leadenhall Street — Massing Options</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e14;--surface:#161822;--surface2:#1e2030;--surface3:#262840;
  --border:#2a2d42;--text:#e8e9f0;--text2:#9498b3;--text3:#626680;
  --accent:#818cf8;--green:#34d399;--green2:#059669;
  --red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;inset:0;right:min(640px,33vw)}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:min(640px,33vw);z-index:10;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(12,14,20,.95) 0%,transparent 100%);pointer-events:none}
.topbar>*{pointer-events:auto}
.logo{font:800 16px var(--sans);color:var(--text)}
.logo span{color:var(--accent)}

/* Option tabs - floating over map */
.options-bar{position:fixed;top:70px;left:24px;z-index:10;display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.opt-btn{padding:10px 18px;border:none;border-radius:9px;font:600 11px var(--sans);cursor:pointer;transition:all .2s;background:transparent;color:var(--text3);letter-spacing:0.3px;position:relative}
.opt-btn:hover{color:var(--text2);background:var(--surface2)}
.opt-btn.active{color:white;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.opt-btn.opt-a.active{background:#059669}
.opt-btn.opt-b.active{background:#6366f1}
.opt-btn.opt-c.active{background:#f59e0b;color:#1a1d2e}
.opt-btn.opt-e.active{background:#dc2626}
.opt-btn .sub{display:block;font:400 8px var(--sans);margin-top:1px;opacity:.7}

/* Side panel */
.panel{position:fixed;top:0;right:0;width:min(640px,33vw);height:100%;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden;z-index:5}
.panel-header{padding:24px 28px 16px;border-bottom:1px solid var(--border)}
.panel-header h1{font:800 11px var(--sans);text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:8px}
.panel-header .address{font:700 22px var(--sans);color:var(--text);line-height:1.3}
.panel-header .subtitle{font:400 12px var(--sans);color:var(--text3);margin-top:4px}

/* Scheme header in panel */
.scheme-header{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.scheme-name{font:800 16px var(--sans);color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.scheme-name .dot{width:10px;height:10px;border-radius:50%}
.scheme-desc{font:300 12px var(--sans);color:var(--text3)}

/* Hero metrics */
.hero-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);margin:0}
.hero-metric{text-align:center;padding:18px 12px;background:var(--surface)}
.hero-metric .label{font:600 8px var(--sans);text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:5px}
.hero-metric .value{font:800 24px var(--mono);letter-spacing:-0.5px}

/* Section */
.section{padding:20px 28px;border-bottom:1px solid var(--border)}
.section-title{font:700 9px var(--sans);text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Stat rows */
.stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-label{font:400 12px var(--sans);color:var(--text3)}
.stat-value{font:600 12px var(--mono);color:var(--text)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.accent{color:var(--accent)}
.stat-value.amber{color:var(--amber)}

/* Risk badge */
.risk{display:inline-block;padding:4px 12px;border-radius:5px;font:600 10px var(--sans);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.risk.low{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.risk.medium{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.risk.high{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}

/* Brief text */
.brief{font:400 12px/1.7 var(--sans);color:var(--text2)}
.brief strong{color:var(--text);font-weight:600}

/* Bar */
.bar-row{margin-bottom:12px}
.bar-label{display:flex;justify-content:space-between;font:500 10px var(--sans);color:var(--text3);margin-bottom:4px}
.bar-track{height:20px;background:var(--surface3);border-radius:5px;overflow:hidden;display:flex}
.bar-fill{height:100%;display:flex;align-items:center;justify-content:center;font:600 8px var(--mono);color:white}

/* Pro forma */
.proforma{width:100%;border-collapse:collapse}
.proforma td{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.proforma td:last-child{text-align:right;font-family:var(--mono);font-weight:500}
.proforma tr.total td{border-top:2px solid var(--text3);border-bottom:none;padding-top:10px;font-weight:700;font-size:13px}
.proforma tr.total td:last-child{color:var(--green)}

/* Export btn */
.export-btn{display:block;width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:8px;font:700 13px var(--sans);cursor:pointer;text-align:center;margin-top:12px;letter-spacing:0.5px}
.export-btn:hover{background:#6366f1}

@media(max-width:900px){
  #map{right:0;bottom:50%}
  .topbar{right:0}
  .panel{width:100%;height:50%;top:auto;bottom:0;border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="logo">D&A <span>Studio</span></div>
</div>

<div class="options-bar" id="optbar">
  <button class="opt-btn opt-a active" onclick="selectOption(0)">Option A<span class="sub">10F Conservative</span></button>
  <button class="opt-btn opt-b" onclick="selectOption(1)">Option B<span class="sub">14F Mid-Rise</span></button>
  <button class="opt-btn opt-c" onclick="selectOption(2)">Option C<span class="sub">22F Tower</span></button>
  <button class="opt-btn opt-e" onclick="selectOption(3)">Existing<span class="sub">6F Current</span></button>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>Massing Options</h1>
    <div class="address">100 Leadenhall Street</div>
    <div class="subtitle">City of London · EC3A 3BP · Zone 1 · PTAL 6a</div>
  </div>
  <div id="panel-body"></div>
</div>

<script>
// CORRECT polygon for 100 Leadenhall Street (OSM way 150335050)
const SITE_COORDS = [[-0.0802763,51.5140146],[-0.0800595,51.5139875],[-0.0798747,51.51396],[-0.0799754,51.5136468],[-0.079809,51.5136257],[-0.0798425,51.5135377],[-0.0798828,51.513445],[-0.0804144,51.5135131],[-0.0803568,51.5136783],[-0.0802864,51.5136687],[-0.0802571,51.5137575],[-0.080298,51.5137608],[-0.0802591,51.5138813],[-0.0803085,51.5138886],[-0.0803056,51.5138968],[-0.0802763,51.5140146]];
const CENTROID = [-0.0801551,51.5137673];
const PLOT_AREA = 1551; // sqm (actual footprint)
const EXISTING_HEIGHT = 25;
const EXISTING_FLOORS = 6;
const FTF = 4.2;

const fmt = n => n?.toLocaleString('en-GB') || '—';

const OPTION_COLORS = {
  a: {main:'#34d399',glow:'rgba(52,211,153,.15)',fill:'#059669',edge:'#34d399'},
  b: {main:'#818cf8',glow:'rgba(129,140,248,.15)',fill:'#6366f1',edge:'#a5b4fc'},
  c: {main:'#fbbf24',glow:'rgba(251,191,36,.15)',fill:'#d97706',edge:'#fbbf24'},
  existing: {main:'#f87171',glow:'rgba(248,113,113,.15)',fill:'#dc2626',edge:'#f87171'}
};

const OPTIONS = [
  {
    key:'a', name:'Option A — Conservative', desc:'10-storey podium with upper setback',
    height:42, floors:10, podiumFloors:6, podiumHeight:25, towerFloors:4, towerFootprintPct:0.65,
    coverage:0.80, niaEfficiency:0.82, costSqft:380, saleSqft:1250,
    risk:'low', riskLabel:'Low Planning Risk',
    planningNotes:'Within established height envelope. Minimal impact on protected views. Pre-app likely to receive positive feedback from City planners.',
    layout:'Full floor plate retained to 6F matching existing street wall. Upper 4 floors step back 3m on south and east facades. Central core with perimeter Grade A offices. Active ground floor retail/lobby (1,020 sqm).',
    staircase:'Dual staircase (Building Safety Act — >18m)', breeam:'BREEAM Excellent',
  },
  {
    key:'b', name:'Option B — Mid-Rise', desc:'14-storey stepped massing with sky terrace',
    height:60, floors:14, podiumFloors:6, podiumHeight:25, towerFloors:8, towerFootprintPct:0.55,
    coverage:0.80, niaEfficiency:0.80, costSqft:400, saleSqft:1307,
    risk:'medium', riskLabel:'Medium Planning Risk',
    planningNotes:'At typical approved height for this area. LVMF protected view assessment required (St Paul\'s sightlines). Wind microclimate study needed. Good precedent from nearby approvals.',
    layout:'6F podium at full plate matching street context. 8F tower steps back 3m south, 2m east creating sky terrace at L7. Central core with dual aspect office floors (NIA ~680sqm/floor). Active ground floor.',
    staircase:'Dual staircase + firefighter lift', breeam:'BREEAM Outstanding',
  },
  {
    key:'c', name:'Option C — Tower', desc:'22-storey slender commercial tower',
    height:92, floors:22, podiumFloors:4, podiumHeight:17, towerFloors:18, towerFootprintPct:0.40,
    coverage:0.75, niaEfficiency:0.77, costSqft:450, saleSqft:1450,
    risk:'high', riskLabel:'High Planning Risk',
    planningNotes:'Exceeds typical height — requires exceptional design quality. Full LVMF, wind, daylight/sunlight studies. GLA referral likely. Strong urban design and public benefit case needed.',
    layout:'Low 4F podium (17m) with public realm at ground. Slender tower rises 18F from L5 at 40% site coverage. Sky lobby at L12. Premium upper floors with panoramic views. Crown/top treatment needed.',
    staircase:'Dual staircase + 2x firefighter lifts', breeam:'BREEAM Outstanding + Net Zero Carbon',
  }
];

// Calculate financials
OPTIONS.forEach(opt => {
  const podiumGross = PLOT_AREA * opt.coverage * opt.podiumFloors;
  const towerGross = PLOT_AREA * opt.towerFootprintPct * opt.coverage * opt.towerFloors;
  const grossArea = podiumGross + towerGross;
  const nia = grossArea * opt.niaEfficiency;
  const existingNia = PLOT_AREA * 0.80 * 0.82 * EXISTING_FLOORS;
  const addedNia = Math.max(0, nia - existingNia);
  const addedNiaSqft = addedNia * 10.764;
  const constructionCost = addedNiaSqft * opt.costSqft;
  const fees = constructionCost * 0.12;
  const cil = addedNia * 186;
  const finance = constructionCost * 0.07 * 2.5;
  const totalCost = constructionCost + fees + cil + finance;
  const gdv = addedNiaSqft * opt.saleSqft;
  const margin = gdv - totalCost;
  opt.nia = Math.round(nia);
  opt.existingNia = Math.round(existingNia);
  opt.addedNia = Math.round(addedNia);
  opt.addedNiaSqft = Math.round(addedNiaSqft);
  opt.constructionCost = Math.round(constructionCost);
  opt.fees = Math.round(fees);
  opt.cil = Math.round(cil);
  opt.finance = Math.round(finance);
  opt.totalCost = Math.round(totalCost);
  opt.gdv = Math.round(gdv);
  opt.margin = Math.round(margin);
  opt.marginPct = gdv > 0 ? (margin/gdv*100).toFixed(0) : '0';
  opt.yieldPct = gdv > 0 ? ((addedNiaSqft * 55)/gdv*100).toFixed(1) : '0';
});

let map, currentOption = 0;

async function init(){
  const cfg = await(await fetch('/api/config')).json();
  mapboxgl.accessToken = cfg.mapboxToken;
  map = new mapboxgl.Map({
    container:'map', style:'mapbox://styles/mapbox/dark-v11',
    center:CENTROID, zoom:17.2, pitch:60, bearing:-20, antialias:true
  });
  map.addControl(new mapboxgl.NavigationControl({visualizePitch:true}),'top-left');

  map.on('style.load',()=>{
    // Dark context buildings
    map.addLayer({
      id:'3d-buildings',type:'fill-extrusion',source:'composite','source-layer':'building',
      minzoom:14,
      paint:{
        'fill-extrusion-color':['interpolate',['linear'],['get','height'],0,'#1a1d2e',30,'#22253a',80,'#2a2d45',150,'#333650'],
        'fill-extrusion-height':['get','height'],
        'fill-extrusion-base':['get','min_height'],
        'fill-extrusion-opacity':0.6,
        'fill-extrusion-vertical-gradient':true,
      }
    });

    // Site boundary
    map.addSource('site',{type:'geojson',data:{type:'Feature',geometry:{type:'Polygon',coordinates:[SITE_COORDS]}}});
    map.addLayer({id:'site-line',type:'line',source:'site',paint:{'line-color':'#818cf8','line-width':2,'line-opacity':0.9,'line-dasharray':[4,2]}});
    map.addLayer({id:'site-glow',type:'line',source:'site',paint:{'line-color':'#818cf8','line-width':8,'line-opacity':0.15,'line-blur':4}});

    // Massing sources
    map.addSource('podium',{type:'geojson',data:emptyPoly()});
    map.addSource('tower',{type:'geojson',data:emptyPoly()});

    map.addLayer({id:'podium-3d',type:'fill-extrusion',source:'podium',paint:{
      'fill-extrusion-color':'#059669','fill-extrusion-height':25,'fill-extrusion-base':0,'fill-extrusion-opacity':0.65
    }});
    map.addLayer({id:'tower-3d',type:'fill-extrusion',source:'tower',paint:{
      'fill-extrusion-color':'#059669','fill-extrusion-height':42,'fill-extrusion-base':25,'fill-extrusion-opacity':0.55
    }});
    map.addLayer({id:'podium-edge',type:'line',source:'podium',paint:{'line-color':'#34d399','line-width':2,'line-opacity':0.8}});
    map.addLayer({id:'tower-edge',type:'line',source:'tower',paint:{'line-color':'#34d399','line-width':2,'line-opacity':0.8}});

    // Floor line sources (pre-create up to 30)
    for(let f=1;f<=30;f++){
      const id='floor-'+f;
      map.addSource(id,{type:'geojson',data:emptyPoly()});
      map.addLayer({id:id,type:'fill-extrusion',source:id,paint:{
        'fill-extrusion-color':'#ffffff','fill-extrusion-height':0,'fill-extrusion-base':0,'fill-extrusion-opacity':0
      }});
    }

    selectOption(0);
  });
}

function emptyPoly(){return {type:'Feature',geometry:{type:'Polygon',coordinates:[[[0,0],[0,0.0001],[0.0001,0.0001],[0,0]]]}};}

function bufferPoly(coords,dist){
  const cx=coords.reduce((s,c)=>s+c[0],0)/coords.length;
  const cy=coords.reduce((s,c)=>s+c[1],0)/coords.length;
  return coords.map(c=>{const dx=c[0]-cx,dy=c[1]-cy,len=Math.sqrt(dx*dx+dy*dy)||0.00001;return[c[0]+(dx/len)*dist,c[1]+(dy/len)*dist]});
}

function shrinkPoly(coords,factor){
  const cx=coords.reduce((s,c)=>s+c[0],0)/coords.length;
  const cy=coords.reduce((s,c)=>s+c[1],0)/coords.length;
  return coords.map(c=>[cx+(c[0]-cx)*factor,cy+(c[1]-cy)*factor]);
}

function selectOption(idx){
  currentOption = idx;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));

  // Clear floor lines
  for(let f=1;f<=30;f++){
    map.setPaintProperty('floor-'+f,'fill-extrusion-opacity',0);
  }

  if(idx===3){
    // Existing
    const col = OPTION_COLORS.existing;
    const geo={type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000004)]}};
    map.getSource('podium').setData(geo);
    map.getSource('tower').setData(emptyPoly());
    map.setPaintProperty('podium-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('podium-3d','fill-extrusion-height',EXISTING_HEIGHT);
    map.setPaintProperty('podium-3d','fill-extrusion-base',0);
    map.setPaintProperty('podium-3d','fill-extrusion-opacity',0.5);
    map.setPaintProperty('tower-3d','fill-extrusion-opacity',0);
    map.setPaintProperty('podium-edge','line-color',col.edge);
    map.setPaintProperty('tower-edge','line-opacity',0);

    // Floor lines for existing
    for(let f=1;f<=EXISTING_FLOORS;f++){
      const h=f*FTF;
      const id='floor-'+f;
      map.getSource(id).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000006)]}});
      map.setPaintProperty(id,'fill-extrusion-color',col.edge);
      map.setPaintProperty(id,'fill-extrusion-height',h+0.15);
      map.setPaintProperty(id,'fill-extrusion-base',h-0.15);
      map.setPaintProperty(id,'fill-extrusion-opacity',0.5);
    }

    renderExistingPanel();
  } else {
    const opt=OPTIONS[idx];
    const col=OPTION_COLORS[opt.key];

    // Podium = full site, slightly outset
    const podiumCoords=bufferPoly(SITE_COORDS,0.000004);
    map.getSource('podium').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[podiumCoords]}});
    map.setPaintProperty('podium-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('podium-3d','fill-extrusion-height',opt.podiumHeight);
    map.setPaintProperty('podium-3d','fill-extrusion-base',0);
    map.setPaintProperty('podium-3d','fill-extrusion-opacity',0.65);
    map.setPaintProperty('podium-edge','line-color',col.edge);
    map.setPaintProperty('podium-edge','line-opacity',0.8);

    // Tower = shrunk footprint
    const towerCoords=shrinkPoly(SITE_COORDS,Math.sqrt(opt.towerFootprintPct));
    map.getSource('tower').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[towerCoords]}});
    map.setPaintProperty('tower-3d','fill-extrusion-color',col.fill);
    map.setPaintProperty('tower-3d','fill-extrusion-height',opt.height);
    map.setPaintProperty('tower-3d','fill-extrusion-base',opt.podiumHeight);
    map.setPaintProperty('tower-3d','fill-extrusion-opacity',0.55);
    map.setPaintProperty('tower-edge','line-color',col.edge);
    map.setPaintProperty('tower-edge','line-opacity',0.8);

    // Floor lines — podium floors use full footprint, tower floors use shrunk
    let floorIdx=1;
    for(let f=1;f<=opt.podiumFloors;f++){
      const h=f*FTF;
      const id='floor-'+floorIdx;
      map.getSource(id).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(SITE_COORDS,0.000006)]}});
      map.setPaintProperty(id,'fill-extrusion-color',col.edge);
      map.setPaintProperty(id,'fill-extrusion-height',h+0.15);
      map.setPaintProperty(id,'fill-extrusion-base',h-0.15);
      map.setPaintProperty(id,'fill-extrusion-opacity',0.5);
      floorIdx++;
    }
    for(let f=1;f<=opt.towerFloors;f++){
      const h=opt.podiumHeight+(f*FTF);
      const id='floor-'+floorIdx;
      const tCoords=shrinkPoly(SITE_COORDS,Math.sqrt(opt.towerFootprintPct));
      map.getSource(id).setData({type:'Feature',geometry:{type:'Polygon',coordinates:[bufferPoly(tCoords,0.000004)]}});
      map.setPaintProperty(id,'fill-extrusion-color',col.edge);
      map.setPaintProperty(id,'fill-extrusion-height',h+0.15);
      map.setPaintProperty(id,'fill-extrusion-base',h-0.15);
      map.setPaintProperty(id,'fill-extrusion-opacity',0.4);
      floorIdx++;
    }

    renderOptionPanel(opt);
  }
}

function renderOptionPanel(opt){
  const col=OPTION_COLORS[opt.key];
  document.getElementById('panel-body').innerHTML = `
    <div class="scheme-header">
      <div class="scheme-name"><div class="dot" style="background:${col.main};width:10px;height:10px;border-radius:50%"></div>${opt.name}</div>
      <div class="scheme-desc">${opt.desc}</div>
    </div>

    <div class="hero-strip">
      <div class="hero-metric"><div class="label">GDV</div><div class="value" style="color:${col.main}">£${fmt(Math.round(opt.gdv/1e6))}M</div></div>
      <div class="hero-metric"><div class="label">Margin</div><div class="value" style="color:var(--green)">${opt.marginPct}%</div></div>
      <div class="hero-metric"><div class="label">Added NIA</div><div class="value" style="color:var(--text)">${fmt(opt.addedNia)}<span style="font-size:12px;color:var(--text3)"> sqm</span></div></div>
    </div>

    <div class="section">
      <div class="section-title">Massing</div>
      <div class="stat-row"><span class="stat-label">Total Height</span><span class="stat-value">${opt.height}m / ${opt.floors}F</span></div>
      <div class="stat-row"><span class="stat-label">Podium</span><span class="stat-value">${opt.podiumHeight}m / ${opt.podiumFloors}F — full plate</span></div>
      <div class="stat-row"><span class="stat-label">Tower</span><span class="stat-value">${opt.height-opt.podiumHeight}m / ${opt.towerFloors}F — ${Math.round(opt.towerFootprintPct*100)}% footprint</span></div>
      <div class="stat-row"><span class="stat-label">Site Coverage</span><span class="stat-value">${Math.round(opt.coverage*100)}%</span></div>
      <div class="stat-row"><span class="stat-label">NIA Efficiency</span><span class="stat-value">${Math.round(opt.niaEfficiency*100)}%</span></div>
    </div>

    <div class="section">
      <div class="section-title">Capacity</div>
      <div class="bar-row">
        <div class="bar-label"><span>Height</span><span>${opt.height}m of 100m typical max</span></div>
        <div class="bar-track">

        <div class="stat-row"><span class="stat-label">Sustainability</span><span class="stat-value">${opt.breeam}</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Pro Forma</div>
      <table class="proforma">
        <tr><td>Additional NIA</td><td>${fmt(opt.addedNia)} sqm (${fmt(opt.addedNiaSqft)} sqft)</td></tr>
        <tr><td>Construction @ £${opt.costSqft}/sqft</td><td>£${fmt(Math.round(opt.constructionCost/1e6*10)/10)}M</td></tr>
        <tr><td>Professional Fees (12%)</td><td>£${fmt(Math.round(opt.fees/1e6*10)/10)}M</td></tr>
        <tr><td>CIL (£186/sqm)</td><td>£${fmt(Math.round(opt.cil/1e6*10)/10)}M</td></tr>
        <tr><td>Finance (7%, 30mo)</td><td>£${fmt(Math.round(opt.finance/1e6*10)/10)}M</td></tr>
        <tr><td style="font-weight:600">Total Development Cost</td><td style="font-weight:600">£${fmt(Math.round(opt.totalCost/1e6*10)/10)}M</td></tr>
        <tr><td>Capital Value @ £${fmt(opt.saleSqft)}/sqft</td><td>£${fmt(Math.round(opt.gdv/1e6*10)/10)}M</td></tr>
        <tr class="total"><td>Development Margin</td><td>£${fmt(Math.round(opt.margin/1e6*10)/10)}M (${opt.marginPct}%)</td></tr>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Planning Risk</div>
      <div><span class="risk ${opt.risk}">${opt.riskLabel}</span></div>
      <div class="brief" style="margin-top:10px">${opt.planningNotes}</div>
    </div>

    <div class="section">
      <button class="export-btn" onclick="window.open('/reports/100-leadenhall-street.html','_blank')">📄 Export Full Report</button>
    </div>
  `;
}
